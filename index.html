// ===================== 细雨 Canvas =====================
function initRain() {
  const canvas = document.getElementById('rain-canvas');
  const ctx = canvas.getContext('2d');
  let w, h, drops = [];

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const dropCount = Math.floor(w * h / 5000);
  for (let i = 0; i < dropCount; i++) {
    drops.push({
      x: Math.random() * w,
      y: Math.random() * h,
      len: Math.random() * 14 + 8,
      speed: Math.random() * 3 + 2.5,
      opacity: Math.random() * 0.28 + 0.08
    });
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);
    ctx.lineWidth = 0.5;
    for (let i = 0; i < drops.length; i++) {
      const d = drops[i];
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x - 0.6, d.y + d.len);
      ctx.strokeStyle = `rgba(180,200,220,${d.opacity})`;
      ctx.stroke();
      d.y += d.speed;
      if (d.y > h + 20) { d.y = -20; d.x = Math.random() * w; }
    }
    requestAnimationFrame(draw);
  }
  draw();
}

// ===================== 窸窣细雨声 (Web Audio API) =====================
const RainSound = {
  ctx: null,
  playing: false,
  masterGain: null,
  noiseNodes: [],

  async start() {
    if (this.playing) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) { return; }

    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = 0;
    this.masterGain.connect(this.ctx.destination);

    // 仅保留低频柔和的沙沙声，模拟静谧细雨窸窣
    // 底层：极低频柔和噪音（微风般的底噪）
    this._createGentleLayer(1, 0.03, 150, 400, 0.4);
    // 中层：柔和的中低频沙沙声（雨丝擦过树叶）
    this._createGentleLayer(2, 0.04, 400, 1500, 0.7);
    // 高层：极轻的高频气息（远处细密雨雾）
    this._createGentleLayer(1, 0.02, 1200, 3500, 0.5);

    // 非常缓慢的淡入（3 秒）
    this.masterGain.gain.linearRampToValueAtTime(0.10, this.ctx.currentTime + 3.0);
    this.playing = true;
  },

  _createGentleLayer(count, volBase, lowFreq, highFreq, q) {
    for (let i = 0; i < count; i++) {
      const bufferSize = this.ctx.sampleRate * 3;
      const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
      const data = buffer.getChannelData(0);
      // 使用更平滑的噪声
      let last = 0;
      for (let j = 0; j < bufferSize; j++) {
        last = last * 0.85 + (Math.random() * 2 - 1) * 0.15;
        data[j] = last;
      }
      const source = this.ctx.createBufferSource();
      source.buffer = buffer;
      source.loop = true;

      const bandpass = this.ctx.createBiquadFilter();
      bandpass.type = 'bandpass';
      bandpass.frequency.value = lowFreq + Math.random() * (highFreq - lowFreq);
      bandpass.Q.value = q;

      const gain = this.ctx.createGain();
      gain.gain.value = volBase + Math.random() * 0.02;

      // 极缓慢的微风式音量波动
      const lfo = this.ctx.createOscillator();
      const lfoGain = this.ctx.createGain();
      lfo.frequency.value = 0.03 + Math.random() * 0.08;
      lfoGain.gain.value = 0.008;
      lfo.connect(lfoGain);
      lfoGain.connect(gain.gain);
      lfo.start();

      source.connect(bandpass);
      bandpass.connect(gain);
      gain.connect(this.masterGain);
      source.start();

      this.noiseNodes.push(source, bandpass, gain, lfo, lfoGain);
    }
  },

  stop() {
    this.playing = false;
    try {
      this.noiseNodes.forEach(n => { try { n.stop(); } catch(e) {} });
    } catch(e) {}
    this.noiseNodes = [];
    if (this.ctx) {
      this.ctx.close();
      this.ctx = null;
    }
  },

  toggle() {
    if (this.playing) {
      this.stop();
      return false;
    } else {
      this.start();
      return true;
    }
  }
};

function bindAuthEvents() {
  window._authMode = window._authMode || 'login';

  document.querySelectorAll('[data-auth-mode]').forEach(el => {
    el.addEventListener('click', () => {
      window._authMode = el.dataset.authMode;
      render();
    });
  });

  const form = document.getElementById('auth-form');
  if (!form) return;
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('auth-username').value.trim();
    const password = document.getElementById('auth-password').value;

    if (window._authMode === 'register') {
      const p2 = document.getElementById('auth-password2').value;
      if (!username || !password) return showToast('请填写所有字段', 'error');
      if (password !== p2) return showToast('两次密码不一致', 'error');
      if (password.length < 3) return showToast('密码至少3位', 'error');

      // IP 限制检查
      const btn = form.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = '检查中...';
      const ip = await getClientIp();
      const ipCheck = await checkIpLimit(ip);
      if (!ipCheck.ok) {
        showToast(ipCheck.msg, 'error');
        btn.disabled = false;
        btn.textContent = '注 册';
        return;
      }

      const result = DB.register(username, password, ip);
      btn.disabled = false;
      btn.textContent = '注 册';
      if (result.ok) {
        DB.login(username, password);
        showToast('注册成功，欢迎加入 XY空间', 'success');
        render();
      } else {
        showToast(result.msg, 'error');
      }
    } else {
      if (!username || !password) return showToast('请输入用户名和密码', 'error');
      const result = DB.login(username, password);
      if (result.ok) {
        showToast('欢迎回来，' + result.user.username, 'success');
        render();
      } else {
        showToast(result.msg, 'error');
      }
    }
  });
}

          <span>👍 ${likes.length}</span><span>👎 ${dislikes.length}</span><span>💬 ${comments.length} 条评论</span>

      </div>

      if (!user) { showToast('请先登录', 'error'); return; }
      const r = DB.toggleLike(noteId);
      if (r && r.ok) {
        overlay.remove();
        openNoteDetail(noteId); // 刷新弹窗
      } else if (r) {
        showToast(r.msg, 'error');
      }
    });
  }
  if (btnDislike) {
    btnDislike.addEventListener('click', () => {
      if (!user) { showToast('请先登录', 'error'); return; }
      const r = DB.toggleDislike(noteId);
      if (r && r.ok) {
        overlay.remove();
        openNoteDetail(noteId);
      } else if (r) {
        showToast(r.msg, 'error');
      }
    });

      if (!confirm('确认通过这条评论？通过后将对所有人可见。')) return;

      if (ok) {

        openNoteDetail(noteId);

      if (ok) {
        overlay.remove();
        openNoteDetail(noteId);
      } else {
        showToast('删除失败，请重试', 'error');
      }
    });
  });

  if (isOwner || isAdmin) {
    overlay.querySelector('#detail-delete').addEventListener('click', async () => {
      if (confirm('确认删除这条分享？')) {
        const ok = await DB.deleteNote(noteId);
        if (!ok) { showToast('删除失败，请重试', 'error'); return; }
        showToast('分享已删除');
        updateHeaderCoins();
        overlay.remove();
        refreshTabContent();
      }
    });
  }

  if (isOwner) {
    overlay.querySelector('#detail-edit').addEventListener('click', () => {
      overlay.remove();
      openNoteModal(noteId);
    });
  }

  if (isAdmin) {
    overlay.querySelector('#detail-featured').addEventListener('click', () => {
      const result = DB.toggleFeatured(noteId);
      if (result.featured) {
        showToast(`⭐ 已加精！作者获得 ${result.coins} XY币`, 'success');
      } else {
        showToast('已取消精华');
      }
      updateHeaderCoins();
      overlay.remove();
      refreshTabContent();
    });

    // 审核通过按钮
    const btnApprove = overlay.querySelector('#detail-approve');
    if (btnApprove) {
      btnApprove.addEventListener('click', () => {
        if (!confirm('确认审核通过这条笔记？通过后将对所有人可见。')) return;
        DB.approveNote(noteId);
        showToast('✅ 笔记已审核通过', 'success');
        overlay.remove();
        refreshTabContent();
      });
    }

    // 驳回删除按钮
    const btnReject = overlay.querySelector('#detail-reject');
    if (btnReject) {
      btnReject.addEventListener('click', () => {
        if (!confirm('确认驳回并删除这条笔记？此操作不可恢复。')) return;
        DB.rejectNote(noteId).then(() => {
          showToast('❌ 笔记已驳回并删除', 'success');
          overlay.remove();
          refreshTabContent();
        });
      });
    }
  }
}

      <div class="empty-state">

        ${links.map(l => {
          const domain = extractDomain(l.url);

          return `
          <div style="position:relative;">
            <a href="${escapeHtml(l.url)}" target="_blank" rel="noopener" class="link-card">
              <div class="link-favicon">
                <img src="https://${domain}/favicon.ico" alt="" loading="lazy" onerror="this.style.display='none';this.parentElement.textContent='${initial}'" style="width:20px;height:20px;">

// ---------- 精灵宠物 Tab ----------
function renderPetTab(user) {
  // 先检查打工是否完成
  const workResult = DB.checkWork(user.id);
  if (workResult) showToast(`🎉 打工完成！获得 ${workResult.coins} XY币`, 'success');
  if (workResult) updateHeaderCoins();

  const livePet = DB.getPetLiveState(user.id);

  // 精灵已死亡
  if (livePet && livePet.dead) return renderPetDeath(user, livePet);
  if (!livePet && DB.isPetDead(user.id)) {
    const deadPet = DB.getPet(user.id);
    return renderPetDeath(user, deadPet);
  }
  if (!livePet) return renderPetSelection();

  const rawPet = DB.getPet(user.id);
  const fullStats = DB.getPetFullStats(user.id) || { atk:5, def:3, hp:50, maxHp:50, crit:5, critDmg:150, dodge:3 };
  const coins = DB.getCoins(user.id);
  const typeInfo = PET_TYPES.find(t => t.id === livePet.type) || PET_TYPES[0];
  const statClass = (v) => v > 60 ? 'stat-good' : v > 25 ? 'stat-warn' : 'stat-bad';
  const moodEmoji = livePet.mood > 70 ? '😊' : livePet.mood > 30 ? '😐' : '😢';

  // 打工状态
  let workStatus = '';
  if (rawPet && rawPet.working) {
    const totalSec = rawPet.working.hours * 3600;
    const elapsed = (Date.now() - rawPet.working.startTime) / 1000;
    const remaining = Math.max(0, totalSec - elapsed);
    if (remaining <= 0) {
      workStatus = '<div id="work-timer" style="margin-top:12px;color:#6bc08a;font-size:13px;">✅ 打工已完成，重新进入页面即可领取！</div>';
    } else {
      const h = Math.floor(remaining / 3600);
      const m = Math.floor((remaining % 3600) / 60);
      const s = Math.floor(remaining % 60);
      workStatus = `<div id="work-timer" style="margin-top:12px;color:#e0b44a;font-size:13px;">⏳ 打工中... 剩余 ${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}</div>`;
    }
  }

  return `
    <div class="pet-container">
      <!-- 金币展示 -->
      <div style="display:flex;justify-content:center;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap;">
        <div style="padding:8px 20px;background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,0.2);border-radius:20px;font-size:14px;">
          💰 <span style="color:#ffd700;font-weight:600;">${coins} XY币</span>
        </div>
        ${(() => {
          const today2 = new Date().toISOString().slice(0,10);
          const canLottery = user.lastLotteryDate !== today2;
          return '<button class="btn btn-sm" id="btn-daily-lottery" style="background:rgba(255,180,50,0.1);border:1px solid rgba(255,180,50,0.25);color:#ffb832;font-size:12px;padding:6px 14px;border-radius:10px;cursor:pointer;font-family:inherit;' + (canLottery ? '' : 'opacity:0.5;cursor:not-allowed;') + '">🎰 ' + (canLottery ? '每日抽奖' : '今日已抽') + '</button>';
        })()}
        <div style="padding:8px 16px;background:rgba(255,255,255,0.04);border:1px solid var(--glass-border);border-radius:20px;font-size:13px;color:var(--text-secondary);">
          🎒 背包 ${DB.getBackpack(user.id).length} 件
        </div>
        ${!rawPet || !rawPet.working ? `<button class="btn btn-primary btn-sm" id="btn-start-work">💼 去打工</button>` : ''}
	        ${rawPet && !rawPet.working && !rawPet.cultivating ? `<button class="btn btn-sm" id="btn-start-cultivate" style="background:rgba(139,119,229,0.08);border:1px solid rgba(139,119,229,0.2);color:#c4b5fd;font-size:12px;padding:6px 14px;border-radius:10px;cursor:pointer;font-family:inherit;">🧘 去修行</button>` : ''}
      </div>

      <div class="pet-display">
        <div class="pet-sprite" id="pet-sprite-click">${typeInfo.sprite}</div>
        <div class="pet-name">${escapeHtml(livePet.name)} <span style="font-size:18px;">${moodEmoji}</span></div>
        <div class="pet-age">🕐 已陪伴 ${formatAge(livePet.ageMs)}</div>
      </div>

      <div class="pet-stats">
        <div class="stat-row">
          <span class="stat-label">🍞 饱食度</span>
          <div class="stat-bar-wrap"><div class="stat-bar-fill ${statClass(livePet.hunger)}" style="width:${livePet.hunger}%"></div></div>
          <span class="stat-val">${livePet.hunger}</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">🛁 清洁值</span>
          <div class="stat-bar-wrap"><div class="stat-bar-fill ${statClass(livePet.cleanliness)}" style="width:${livePet.cleanliness}%"></div></div>
          <span class="stat-val">${livePet.cleanliness}</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">💖 心情值</span>
          <div class="stat-bar-wrap"><div class="stat-bar-fill ${statClass(livePet.mood)}" style="width:${livePet.mood}%"></div></div>
          <span class="stat-val">${livePet.mood}</span>
        </div>
      </div>

      <!-- 战力 -->
      <div style="text-align:center;margin-bottom:8px;" id="pet-cp-display">
        <span style="font-size:22px;font-weight:700;color:#ffd700;">⚡ ${DB.getCombatPower(user.id)}</span>
        <span style="font-size:11px;color:var(--text-secondary);margin-left:4px;">战力</span>
      </div>

      <!-- 战斗属性（含装备加成）-->
      <div class="battle-stats">
        <div class="battle-stat-chip">⚔️ 攻击 <span>${fullStats.atk}</span></div>
        <div class="battle-stat-chip">🛡️ 防御 <span>${fullStats.def}</span></div>
        <div class="battle-stat-chip">❤️ 生命 <span>${fullStats.hp}/${fullStats.maxHp}</span></div>
        <div class="battle-stat-chip">💥 暴击 <span>${fullStats.crit}%</span></div>
        <div class="battle-stat-chip">💢 暴伤 <span>${fullStats.critDmg}%</span></div>
        <div class="battle-stat-chip">🪽 闪避 <span>${fullStats.dodge}%</span></div>
      </div>

      <!-- 装备栏 -->
      <div class="equip-slots">
        <div style="color:var(--text-secondary);font-size:11px;margin-bottom:6px;text-align:left;">⚔️ 装备</div>
        ${(() => {
          const slots = [
            { key: "weapon", icon: "⚔️", label: "武器" },
            { key: "helmet", icon: "⛑️", label: "头盔" },
            { key: "armor", icon: "🛡️", label: "护甲" },
            { key: "boots", icon: "👢", label: "鞋子" }
          ];
          const bp = DB.getBackpack(user.id);
          return slots.map(s => {
            const equippedBid = rawPet ? rawPet[s.key] : null;
            const item = equippedBid ? bp.find(i => i.bid === equippedBid) : null;
            const rarityClass = item ? "equip-rarity-" + (item.rarity || "common") : "";
            const statText = item && item.stats ? Object.entries(item.stats).map(([k,v]) => {
              const names = { atk:"攻", def:"防", maxHp:"血", dodge:"闪" };
              return (names[k]||k) + "+" + v;
            }).join(" ") : "";
            const affixNames = { atk:"攻", def:"防", maxHp:"血", crit:"暴击", critDmg:"暴伤", dodge:"闪" };
            const affixText = item && item.affixes ? item.affixes.map(a => a.name + "+" + a.val + (a.stat==="critDmg"||a.stat==="crit"?"%":"") + affixNames[a.stat]).join(" ") : "";
            const detail = [statText, affixText].filter(Boolean).join(" · ");
            return `<div class="equip-slot-row">
              <div class="equip-slot-icon">${s.icon}</div>
              <div class="equip-slot-info">
                <div class="equip-slot-name ${rarityClass}">${item ? item.name : "—"}</div>
                ${detail ? `<div class="equip-slot-detail">${detail}</div>` : ""}
              </div>
              <div class="equip-slot-act">
                ${item ? `<button class="btn btn-ghost btn-sm unequip-btn" data-slot="${s.key}" style="font-size:10px;padding:2px 8px;">卸下</button>` : ""}
              </div>
            </div>`;
          }).join("");
        })()}
      </div>

      <!-- 礼包盒子 -->
      <div class="gift-box-section">
        <div class="gift-box-badge">🎁 礼包盒子: <b id="gift-box-count">${DB.getGiftBoxes()}</b> 个</div>
        <button class="btn btn-sm" id="btn-open-gift" style="background:rgba(255,200,100,0.12);border-color:rgba(255,200,100,0.3);color:#ffd700;font-size:12px;padding:6px 14px;">📦 打开礼包</button>
      </div>

      <!-- 修行系统（与打工互斥）-->
      ${rawPet && rawPet.cultivating ? `
        <div class="cultivation-timer" id="cultivation-timer">🧘 修行中...</div>
        <div style="text-align:center;margin-top:6px;"><button class="btn btn-ghost btn-sm" id="btn-cancel-cultivate">🚫 取消修行</button></div>
      ` : ""}

      <div class="pet-actions">
        <button class="pet-action-btn" id="btn-open-backpack"><span class="action-icon">🎒</span>背包</button>
        <button class="pet-action-btn" id="btn-open-shop2"><span class="action-icon">🛒</span>商店</button>
        ${rawPet && rawPet.working ? `<button class="pet-action-btn" id="btn-cancel-work"><span class="action-icon">🚫</span>取消打工</button>` : ''}
        ${rawPet && rawPet.cultivating ? `<button class="pet-action-btn" id="btn-cancel-cultivate"><span class="action-icon">🚫</span>取消修行</button>` : ''}
        <button class="pet-action-btn btn-battle" id="btn-battle-pet"><span class="action-icon">⚔️</span>切磋</button>
      </div>

function renderAdminTable(tableName) {
  const { label, columns, rows } = DB.adminReadTable(tableName);
  if (rows.length === 0) {
    return `<div class="empty-state"><div class="empty-icon">📭</div><p>暂无 ${label} 数据</p></div>`;
  }

  // 需要显示为文本的列（不提供输入框编辑）
  const idColumns = new Set(['id','bid','user_id','authorId','addedBy','createdAt','birthTime','lastTick','lastLoginDate']);

  const rowsHtml = rows.map((row, i) => {
    const rowId = row.id || row.bid || row.user_id || row.name || i;
    const cells = columns.map(col => {
      let val = row[col];
      if (val === null || val === undefined) val = '';
      else if (typeof val === 'object') val = JSON.stringify(val);
      else val = String(val);

      const isReadonly = idColumns.has(col);
      if (col === 'createdAt' || col === 'birthTime' || col === 'lastTick') {
        const n = Number(val);
        if (n > 100000) val = new Date(n).toLocaleString('zh-CN');
      }

      if (isReadonly) {
        return `<span class="admin-cell-readonly" title="${col}">${escapeHtml(val).substring(0, 30)}</span>`;
      }
      if (col === 'dead' || col === 'featured') {
        const checked = val === 'true';
        return `<label style="font-size:12px;white-space:nowrap;"><input type="checkbox" class="admin-input" data-col="${col}" data-row="${rowId}" ${checked ? 'checked' : ''}> ${col}</label>`;
      }
      if (col === 'role') {
        return `<select class="admin-input" data-col="${col}" data-row="${rowId}" style="font-size:11px;padding:4px 6px;border-radius:4px;background:var(--glass-bg);color:var(--text-primary);border:1px solid var(--glass-border);">${['user','admin'].map(r => `<option value="${r}" ${val===r?'selected':''}>${r}</option>`).join('')}</select>`;
      }
      if (col === 'visibility') {
        return `<select class="admin-input" data-col="${col}" data-row="${rowId}" style="font-size:11px;padding:4px 6px;border-radius:4px;background:var(--glass-bg);color:var(--text-primary);border:1px solid var(--glass-border);">${['public','private'].map(r => `<option value="${r}" ${val===r?'selected':''}>${r}</option>`).join('')}</select>`;
      }
      if (col === 'status') {
        return `<select class="admin-input" data-col="${col}" data-row="${rowId}" style="font-size:11px;padding:4px 6px;border-radius:4px;background:var(--glass-bg);color:var(--text-primary);border:1px solid var(--glass-border);">${['approved','pending','rejected'].map(r => `<option value="${r}" ${val===r?'selected':''}>${r}</option>`).join('')}</select>`;
      }
      if (col === 'content' || col === 'desc' || col === 'working') {
        return `<input class="admin-input" data-col="${col}" data-row="${rowId}" value="${escapeHtml(val)}" style="width:140px;font-size:11px;padding:4px 6px;border-radius:4px;border:1px solid var(--glass-border);background:rgba(255,255,255,0.04);color:var(--text-primary);">`;
      }
      return `<input class="admin-input" data-col="${col}" data-row="${rowId}" value="${escapeHtml(val)}" style="width:80px;font-size:11px;padding:4px 6px;border-radius:4px;border:1px solid var(--glass-border);background:rgba(255,255,255,0.04);color:var(--text-primary);">`;
    });

    const deleteBtn = tableName !== 'users' || rows[i].role !== 'admin'
      ? `<button class="btn btn-danger btn-sm admin-delete-btn" data-row="${rowId}" style="font-size:10px;padding:3px 8px;">🗑</button>`
      : '';

    return `<tr>
      ${cells.map(c => `<td style="padding:4px 6px;white-space:nowrap;">${c}</td>`).join('')}
      <td style="padding:4px 6px;white-space:nowrap;">
        <button class="btn btn-primary btn-sm admin-save-btn" data-row="${rowId}" style="font-size:10px;padding:3px 8px;">💾</button>
        ${deleteBtn}
      </td>
    </tr>`;
  }).join('');

  return `
    <table style="width:100%;border-collapse:collapse;font-size:12px;">
      <thead>
        <tr style="background:rgba(255,255,255,0.04);">
          ${columns.map(c => `<th style="padding:8px 6px;text-align:left;color:var(--text-secondary);font-weight:500;white-space:nowrap;font-size:11px;">${c}</th>`).join('')}
          <th style="padding:8px 6px;text-align:center;color:var(--text-secondary);font-weight:500;white-space:nowrap;font-size:11px;">操作</th>
        </tr>
      </thead>
      <tbody>${rowsHtml}</tbody>
    </table>
    <div style="margin-top:12px;text-align:right;font-size:11px;color:var(--text-secondary);">共 ${rows.length} 条记录 · 修改后点击 💾 保存 · 变更立即同步到云端</div>`;
}

function bindAdminEvents() {
  const select = document.getElementById('admin-table-select');
  const container = document.getElementById('admin-table-container');
  if (!select || !container) return;

  const renderTable = () => {
    container.innerHTML = renderAdminTable(select.value);
    bindAdminRowEvents(container);
  };

  select.addEventListener('change', renderTable);
  // 首次加载
  renderTable();

  // 礼包发放：填充用户列表
  const giftSelect = document.getElementById('admin-gift-user');
  const giftAmount = document.getElementById('admin-gift-amount');
  const giftSend = document.getElementById('admin-gift-send');
  const giftMsg = document.getElementById('admin-gift-msg');
  if (giftSelect) {
    const db = JSON.parse(localStorage.getItem(DB._key) || '{}');
    (db.users || []).forEach(u => {
      const opt = document.createElement('option');
      opt.value = u.id;
      opt.textContent = u.username + ' (' + (u.giftBoxes || 0) + '个礼包)';
      giftSelect.appendChild(opt);
    });
  }
  if (giftSend) {
    giftSend.addEventListener('click', async () => {
      const userId = giftSelect.value;
      const amount = parseInt(giftAmount.value) || 1;
      if (!userId) { giftMsg.innerHTML = '<span style="color:var(--danger);">请选择玩家</span>'; return; }
      if (amount < 1 || amount > 999) { giftMsg.innerHTML = '<span style="color:var(--danger);">数量需在1-999之间</span>'; return; }
      // 读取并更新用户礼包数
      const db = JSON.parse(localStorage.getItem(DB._key) || '{}');
      const user = (db.users || []).find(u => u.id === userId);
      if (!user) { giftMsg.innerHTML = '<span style="color:var(--danger);">用户不存在</span>'; return; }
      user.giftBoxes = (user.giftBoxes || 0) + amount;
      localStorage.setItem(DB._key, JSON.stringify(db));
      // 同步到 Supabase
      if (SupabaseSync._ready) {
        const { error } = await SupabaseSync._client.from('users').update({ gift_boxes: user.giftBoxes }).eq('id', userId);
        if (error) { giftMsg.innerHTML = '<span style="color:var(--danger);">同步失败: ' + error.message + '</span>'; return; }
      }
      giftMsg.innerHTML = '<span style="color:var(--accent);">✅ 已发放 ' + amount + ' 个礼包给 ' + user.username + '（当前共 ' + user.giftBoxes + ' 个）</span>';
      // 刷新下拉框显示
      const opt = giftSelect.querySelector('option[value="' + userId + '"]');
      if (opt) opt.textContent = user.username + ' (' + user.giftBoxes + '个礼包)';
    });
  }
}

function bindAdminRowEvents(container) {
  // 保存按钮
  container.querySelectorAll('.admin-save-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const rowEl = btn.closest('tr');
      const rowId = btn.dataset.row;
      const tableName = document.getElementById('admin-table-select').value;
      const rowData = {};
      rowEl.querySelectorAll('.admin-input').forEach(input => {
        const col = input.dataset.col;
        if (input.type === 'checkbox') {
          rowData[col] = input.checked;
        } else {
          rowData[col] = input.value;
        }
      });
      // 设置 ID
      if (tableName === 'users' || tableName === 'notes' || tableName === 'links' || tableName === 'messages') {
        rowData.id = rowId;
      } else if (tableName === 'backpack') {
        rowData.bid = rowId;
      } else {
        rowData.user_id = rowId;
      }

      const ok = DB.adminSaveRow(tableName, rowData);
      if (ok) {
        showToast('✅ 数据已保存并同步到云端', 'success');
        // 刷新显示
        container.innerHTML = renderAdminTable(tableName);
        bindAdminRowEvents(container);
      } else {
        showToast('保存失败', 'error');
      }
    });
  });

  // 删除按钮
  container.querySelectorAll('.admin-delete-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const rowId = btn.dataset.row;
      const tableName = document.getElementById('admin-table-select').value;
      const { label } = DB.adminReadTable(tableName);
      if (!confirm(`⚠️ 确认从「${label}」中永久删除此记录？\n\n此操作不可恢复，将立即同步到云端。`)) return;

      const ok = DB.adminDeleteRow(tableName, rowId);
      if (ok) {
        showToast(`✅ 已从「${label}」中删除并同步到云端`, 'success');
        container.innerHTML = renderAdminTable(tableName);
        bindAdminRowEvents(container);
      } else {
        showToast('删除失败（可能是管理员账户不可删除）', 'error');
      }
    });
  });
}

function bindContentEvents() {

      noteFilter = el.dataset.noteFilter;

    });

  // 链接分类筛选

    el.addEventListener('click', () => {
      linkCategory = el.dataset.cat;
      refreshTabContent();
    });
  });

  const btnAddLink = document.getElementById('btn-add-link');
  if (btnAddLink) btnAddLink.addEventListener('click', () => openLinkModal());

  // 管理分类
  const btnManageCats = document.getElementById('btn-manage-cats');
  if (btnManageCats) btnManageCats.addEventListener('click', () => openCategoryModal());

  // 删除链接
  document.querySelectorAll('[data-del-link]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.preventDefault(); e.stopPropagation();
      if (confirm('确认删除此导航链接？')) {
        const ok = await DB.deleteLink(btn.dataset.delLink);
        if (!ok) { showToast('删除失败，请重试', 'error'); return; }

        refreshTabContent();
      }
    });

  // 删除留言
  document.querySelectorAll('[data-del-msg]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (confirm('确认删除此留言？')) {
        const ok = await DB.deleteMessage(btn.dataset.delMsg);
        if (!ok) { showToast('删除失败，请重试', 'error'); return; }
        showToast('留言已删除');
        refreshTabContent();
      }
    });
  });

  // 删除用户（管理员）
  document.querySelectorAll('[data-del-user]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const username = btn.closest('div').querySelector('span').textContent;
      if (confirm(`⚠️ 确认删除用户「${username}」及其所有数据？\n\n此操作不可恢复，将删除：\n- 该用户的所有笔记、链接、留言\n- 该用户的精灵、XY币、背包物品\n\n确定删除吗？`)) {
        btn.disabled = true;
        btn.textContent = '删除中...';
        const ok = await DB.deleteUser(btn.dataset.delUser);
        if (ok) {
          showToast(`用户「${username}」及其数据已删除`, 'success');
        } else {
          showToast('删除失败', 'error');
          btn.disabled = false;
          btn.textContent = '🗑 删除账户及所有数据';
        }
        refreshTabContent();
      }
    });
  });

  // 发送留言
  const msgForm = document.getElementById('leave-msg-form');
  if (msgForm) {
    msgForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const content = document.getElementById('msg-content').value.trim();
      if (!content) return showToast('请输入留言内容', 'error');
      DB.addMessage(content);
      document.getElementById('msg-content').value = '';
      showToast('留言已发送，感谢你的反馈！', 'success');
    });
  }

  // 精灵：选择
  document.querySelectorAll('[data-select-pet]').forEach(el => {
    el.addEventListener('click', () => {
      const typeId = el.dataset.selectPet;
      const typeInfo = PET_TYPES.find(t => t.id === typeId);
      const defaultName = typeInfo ? typeInfo.name : '小精灵';
      const name = prompt(`给你的${defaultName}起个名字吧：`, defaultName);
      if (!name || !name.trim()) return;
      const user = DB.getCurrentUser();
      DB.createPet(user.id, typeId, name.trim());

    petSprite.addEventListener('click', () => {
      const user = DB.getCurrentUser();
      const pet = DB.getPetLiveState(user.id);
      if (pet && Math.random() < 0.02) {
        const newMood = Math.min(100, pet.mood + 2);
        DB.updatePet(user.id, {
          hunger: pet.hunger,
          cleanliness: pet.cleanliness,
          mood: newMood,

        });

      if (!confirm(`确定要放生「${pet.name}」吗？陪伴数据将清零，你可以重新选择精灵。`)) return;

      if (!ok) { showToast('放生失败，请重试', 'error'); return; }

  // 精灵：重新选择（死亡后）

  if (btnReborn) {
    btnReborn.addEventListener('click', async () => {

// ---------- 打工轮询 ----------
function startWorkPolling() {
  stopWorkPolling();
  workPollInterval = setInterval(() => {
    const user = DB.getCurrentUser();
    if (!user || currentTab !== 'pet') {
      stopWorkPolling();
      return;
    }
    const rawPet = DB.getPet(user.id);
    if (!rawPet || !rawPet.working) {
      stopWorkPolling();
      return;
    }
    const totalSec = rawPet.working.hours * 3600;
    const elapsed = (Date.now() - rawPet.working.startTime) / 1000;
    const remaining = Math.max(0, totalSec - elapsed);
    const timerEl = document.getElementById('work-timer');

    if (remaining <= 0) {
      // 打工完成
      const result = DB.checkWork(user.id);
      stopWorkPolling();
      if (result) {
        showToast(`🎉 打工完成！获得 ${result.coins} XY币`, 'success');
        updateHeaderCoins();
        refreshTabContent();
      }
    } else {
      // 每秒更新计时器显示
      if (timerEl) {
        const h = Math.floor(remaining / 3600);
        const m = Math.floor((remaining % 3600) / 60);
        const s = Math.floor(remaining % 60);
        timerEl.innerHTML = `⏳ 打工中... 剩余 ${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        timerEl.style.color = '#e0b44a';
      }
    }
  }, 1000);
}

function stopWorkPolling() {
  if (workPollInterval) {
    clearInterval(workPollInterval);
    workPollInterval = null;
  }
}

// ---------- 修行计时器 ----------
let cultTimerInterval = null;
function startCultivationTimer() {
  stopCultivationTimer();
  cultTimerInterval = setInterval(() => {
    const user = DB.getCurrentUser();
    if (!user || currentTab !== 'pet') {
      stopCultivationTimer();
      return;
    }
    const pet = DB.getPet(user.id);
    if (!pet || !pet.cultivating) {
      stopCultivationTimer();
      return;
    }
    const totalSec = pet.cultivating.hours * 3600;
    const elapsed = (Date.now() - pet.cultivating.startTime) / 1000;
    const remaining = Math.max(0, totalSec - elapsed);
    const timerEl = document.getElementById('cultivation-timer');
    if (remaining <= 0) {
      const boxes = DB.checkCultivating(user.id);
      stopCultivationTimer();
      if (boxes !== null) {
        showToast(`🧘 修行完成！获得 ${boxes} 个礼包盒子 🎁`, 'success');
        refreshTabContent();
      }
    } else {
      if (timerEl) {
        const h = Math.floor(remaining / 3600);
        const m = Math.floor((remaining % 3600) / 60);
        const s = Math.floor(remaining % 60);
        timerEl.innerHTML = `🧘 修行中... 剩余 ${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} · 完成后获得礼包盒子`;
      }
    }
  }, 1000);
}
function stopCultivationTimer() {
  if (cultTimerInterval) {
    clearInterval(cultTimerInterval);
    cultTimerInterval = null;
  }
}

function showBattleResult(result, defId) {
  const oppUsers = DB.getUsersWithPets();
  const opp = oppUsers.find(o => o.userId === defId) || { petName: '对手', username: '未知' };
  const user = DB.getCurrentUser();
  const myName = user ? user.username : '你';
  const myPet = DB.getPet(user ? user.id : null);
  const myPetType = myPet ? PET_TYPES.find(t => t.id === myPet.type) : null;

  // 递增切磋次数
  const today = new Date().toDateString();
  if (user.battleDate !== today) { user.battleDate = today; user.battleCount = 0; }
  user.battleCount = (user.battleCount || 0) + 1;
  const bdb = DB._read();
  const buidx = (bdb.users || []).findIndex(u => u.id === user.id);
  if (buidx >= 0) { bdb.users[buidx].battleCount = user.battleCount; bdb.users[buidx].battleDate = today; }
  DB._write(bdb);
  if (SupabaseSync._ready) {
    SupabaseSync._client.from('users').upsert({ id: user.id, battle_count: user.battleCount, battle_date: today }).then(() => {}, () => {});
  }

  // 战斗后属性成长
  const won = result.winner === user.id;
  const growth = DB.applyBattleGrowth(user.id, won);
  const growthMsg = growth ? `<div style="text-align:center;margin-bottom:12px;padding:8px;background:rgba(126,184,218,0.1);border-radius:8px;font-size:12px;color:var(--accent);">⚡ 战斗历练！${growth.name}永久 +1（${growth.oldVal}→${growth.newVal}）</div>` : '';
  const battleCheck = DB.dailyBattleCheck(user.id);

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal glass-card" style="max-width:460px;">
      <div style="text-align:center;margin-bottom:16px;">
        <span style="font-size:32px;">${myPetType?.icon || '🐾'}</span>
        <span style="font-size:24px;margin:0 8px;">⚔️</span>
        <span style="font-size:32px;">${PET_TYPES.find(t => t.id === opp.petType)?.icon || '🐾'}</span>
      </div>
      <div id="battle-result-area" style="display:none;"></div>
      <div style="text-align:center;font-size:13px;color:var(--text-secondary);margin-bottom:8px;" id="battle-waiting">⚔️ 战斗进行中...</div>
      <div class="battle-log" id="battle-log-container" style="max-height:260px;overflow-y:auto;padding:12px;background:rgba(0,0,0,0.2);border-radius:8px;font-size:12px;line-height:1.8;"></div>
      <div class="modal-actions" style="margin-top:16px;">
        <button class="btn btn-ghost" id="modal-result-close">关闭</button>
        <button class="btn btn-primary btn-sm" id="modal-result-retry" onclick="this.closest('.modal-overlay').remove(); openBattleModal();">再战一场</button>
      </div>
    </div>`;

  document.body.appendChild(overlay);
  // 逐行动画展示战斗记录（每行0.8秒间隔）
  const logContainer = overlay.querySelector('#battle-log-container');
  const resultArea = overlay.querySelector('#battle-result-area');
  const waitingText = overlay.querySelector('#battle-waiting');
  if (logContainer && result.log && result.log.length > 0) {
    let lineIndex = 0;
    const showNextLine = () => {
      if (lineIndex < result.log.length) {
        const lineDiv = document.createElement('div');
        lineDiv.innerHTML = result.log[lineIndex];
        lineDiv.style.opacity = '0';
        lineDiv.style.transform = 'translateX(-10px)';
        lineDiv.style.transition = 'opacity 0.3s, transform 0.3s';
        logContainer.appendChild(lineDiv);
        requestAnimationFrame(() => {
          lineDiv.style.opacity = '1';
          lineDiv.style.transform = 'translateX(0)';
        });
        logContainer.scrollTop = logContainer.scrollHeight;
        lineIndex++;
        setTimeout(showNextLine, 800);
      } else {
        // 所有回合播完，展示结果
        if (waitingText) waitingText.style.display = 'none';
        const resultHtml = [
          '<div style="text-align:center;font-size:16px;font-weight:600;margin-bottom:4px;color:' + (result.winner === user.id ? 'var(--accent)' : 'var(--danger)') + ';">',
          result.winner === user.id ? '🎉 ' + escapeHtml(myName) + ' 获胜！' : '💔 ' + escapeHtml(opp.username) + ' 获胜！',
          '</div>',
          '<div style="font-size:12px;color:var(--text-secondary);text-align:center;margin-bottom:4px;">',
          escapeHtml(myName) + ' ' + result.aFinalHp + ' / ' + result.dFinalHp + ' ' + escapeHtml(opp.petName),
          '</div>',
          '<div style="font-size:11px;color:var(--text-secondary);text-align:center;margin-bottom:12px;">今日剩余切磋：' + battleCheck.remaining + '/' + battleCheck.total + ' 次</div>'
        ].join('');
        resultArea.innerHTML = resultHtml;
        resultArea.style.display = 'block';
        resultArea.style.animation = 'none';
        resultArea.offsetHeight;
        resultArea.style.animation = 'fadeIn 0.5s ease-out';
      }
    };
    setTimeout(showNextLine, 400);
  }
  overlay.querySelector('#modal-result-close').addEventListener('click', () => {
    overlay.remove();
    if (growth) setTimeout(() => showGrowthModal(growth), 300);
  });
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) {
      overlay.remove();
      if (growth) setTimeout(() => showGrowthModal(growth), 300);
    }
  });
}

      <h3>${isEdit ? '编辑分享' : '写分享'}</h3>

      <div class="form-group">
        <label class="form-label">内容</label>
        <textarea class="form-textarea" id="modal-note-content" placeholder="记录你的学习心得...">${isEdit ? escapeHtml(note.content) : ''}</textarea>

            ${allCats.map(c => `<option value="${escapeHtml(c)}" ${(note && note.category === c) ? 'selected' : ''}>${escapeHtml(c)}</option>`).join('')}
          </select>
          <button class="btn btn-ghost btn-sm" id="btn-new-note-cat" type="button" style="flex-shrink:0;">+ 新分类</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">可见范围</label>
        <div class="vis-toggle" id="modal-vis-toggle">
          <button class="vis-option ${(!note || note.visibility==='public')?'active':''}" data-vis="public">🌍 公开</button>
          <button class="vis-option ${(note && note.visibility==='private')?'active':''}" data-vis="private">🔒 私有</button>
        </div>
      </div>
      ${!isEdit && !DB.isAdmin() ? `<div style="margin-top:-8px;margin-bottom:8px;padding:8px 12px;background:rgba(255,200,50,0.08);border:1px solid rgba(255,200,50,0.15);border-radius:8px;font-size:12px;color:#e0b44a;text-align:center;">⏳ 公开分享需经管理员审核通过后才会对他人可见</div>` : ''}
      ${isEdit && !DB.isAdmin() && note && note.visibility === 'public' ? `<div style="margin-top:-8px;margin-bottom:8px;padding:8px 12px;background:rgba(255,200,50,0.08);border:1px solid rgba(255,200,50,0.15);border-radius:8px;font-size:12px;color:#e0b44a;text-align:center;">⏳ 编辑后需重新经管理员审核</div>` : ''}
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modal-cancel">取消</button>
        <button class="btn btn-primary" id="modal-save">${isEdit ? '保存修改' : '发布分享'}</button>
      </div>
    </div>`;

  document.body.appendChild(overlay);

  let visibility = (note && note.visibility) || 'public';
  overlay.querySelectorAll('.vis-option').forEach(btn => {
    btn.addEventListener('click', () => {
      overlay.querySelectorAll('.vis-option').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      visibility = btn.dataset.vis;
    });
  });

  // 新分类
  overlay.querySelector('#btn-new-note-cat').addEventListener('click', () => {
    const name = prompt('输入新分类名称：');
    if (name && name.trim()) {
      DB.addNoteCategory(name.trim());
      const sel = overlay.querySelector('#modal-note-cat');
      const opt = document.createElement('option');
      opt.value = name.trim(); opt.textContent = name.trim(); opt.selected = true;
      sel.appendChild(opt);
    }
  });

  overlay.querySelector('#modal-cancel').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

  overlay.querySelector('#modal-save').addEventListener('click', () => {
    const title = overlay.querySelector('#modal-note-title').value.trim();
    const content = overlay.querySelector('#modal-note-content').value.trim();
    const category = overlay.querySelector('#modal-note-cat').value;
    if (!title) return showToast('请输入标题', 'error');
    if (!content) return showToast('请输入内容', 'error');

    if (isEdit) {

      showToast(visibility === 'public' && !DB.isAdmin() ? '已更新，重新进入审核队列' : '分享已更新');

      showToast(visibility === 'public' && !DB.isAdmin() ? '已提交审核，通过后将公开显示' : '分享发布成功');
    }
    overlay.remove();
    refreshTabContent();
  });
}

      <div class="form-group">
        <label class="form-label">分类</label>
        <div style="display:flex;gap:8px;align-items:center;">
          <select class="form-select" id="modal-link-cat" style="flex:1;">
            ${categories.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('')}
          </select>
          <button class="btn btn-ghost btn-sm" id="btn-new-cat" type="button" style="flex-shrink:0;">+ 新分类</button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modal-cancel">取消</button>
        <button class="btn btn-primary" id="modal-save">添加</button>
      </div>
    </div>`;

  document.body.appendChild(overlay);
  overlay.querySelector('#modal-cancel').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

  // 新分类
  overlay.querySelector('#btn-new-cat').addEventListener('click', () => {
    const name = prompt('输入新分类名称：');
    if (name && name.trim()) {
      const trimmed = name.trim();
      DB.addLinkCategory(trimmed);
      const sel = overlay.querySelector('#modal-link-cat');
      const opt = document.createElement('option');
      opt.value = trimmed; opt.textContent = trimmed; opt.selected = true;
      sel.appendChild(opt);
    }
  });

  overlay.querySelector('#modal-save').addEventListener('click', () => {
    const name = overlay.querySelector('#modal-link-name').value.trim();
    const url = overlay.querySelector('#modal-link-url').value.trim();
    const desc = overlay.querySelector('#modal-link-desc').value.trim();
    const cat = overlay.querySelector('#modal-link-cat').value;
    if (!name) return showToast('请输入网站名称', 'error');
    if (!url) return showToast('请输入网址', 'error');
    DB.addLink(name, url, desc, cat);
    showToast('网址已添加');
    overlay.remove();
    refreshTabContent();
  });
}

// ---------- 精灵商店弹窗 ----------
function openShopModal() {
  const user = DB.getCurrentUser();
  const coins = DB.getCoins(user.id);

  const renderItemRow = (item) => `
    <div style="display:flex;align-items:center;gap:10px;padding:12px;background:rgba(255,255,255,0.03);border-radius:10px;border:1px solid var(--glass-border);">
      <span style="font-size:28px;">${item.icon}</span>
      <div style="flex:1;min-width:0;">
        <div style="font-size:14px;font-weight:600;">${item.name}</div>
        <div style="font-size:11px;color:var(--text-secondary);">${item.desc}</div>
        <div style="font-size:11px;color:var(--accent);margin-top:2px;">
          ${item.stat ? '⚡' + item.statName + '永久+1' : ''}${item.hunger ? '🍞+' + item.hunger + ' ' : ''}${item.cleanliness ? '🛁+' + item.cleanliness + ' ' : ''}${item.mood ? '💖+' + item.mood : ''}
        </div>
      </div>
      <button class="btn btn-primary btn-sm shop-buy-btn" data-item-id="${item.id}" style="flex-shrink:0;min-width:70px;">
        💰${item.price}
      </button>
    </div>`;

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal glass-card" style="max-width:600px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h3 style="margin:0;">🛒 精灵商店</h3>
        <span style="font-size:14px;color:#ffd700;">💰 ${coins} XY币</span>
      </div>

      <h4 style="font-size:14px;margin-bottom:10px;color:var(--accent);">🍞 食物</h4>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">
        ${SHOP_ITEMS.food.map(renderItemRow).join('')}
      </div>

      <h4 style="font-size:14px;margin-bottom:10px;color:var(--accent);">🛁 清洁用品</h4>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">
        ${SHOP_ITEMS.clean.map(renderItemRow).join('')}
      </div>

      <h4 style="font-size:14px;margin-bottom:10px;color:var(--accent);">🎾 玩具</h4>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">
        ${SHOP_ITEMS.toy.map(renderItemRow).join('')}
      </div>

      <h4 style="font-size:14px;margin-bottom:10px;color:#c4b5fd;">💊 属性丹药</h4>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">
        ${SHOP_ITEMS.boost.map(renderItemRow).join('')}
      </div>

      <h4 style="font-size:14px;margin-bottom:10px;color:#ffd700;">🎁 礼包</h4>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">
        ${SHOP_ITEMS.gift.map(renderItemRow).join('')}
      </div>

      <div class="modal-actions">
        <button class="btn btn-ghost" id="modal-shop-close">关闭</button>
      </div>
    </div>`;

  document.body.appendChild(overlay);
  overlay.querySelector('#modal-shop-close').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

  // 购买逻辑 → 加入背包
  overlay.querySelectorAll('.shop-buy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const itemId = btn.dataset.itemId;
      let item = null;
      let itemType = null;
      for (const cat of ['food', 'clean', 'toy', 'boost', 'gift']) {
        item = SHOP_ITEMS[cat].find(i => i.id === itemId);
        if (item) { itemType = cat; break; }
      }
      if (!item) return;

      const currentCoins = DB.getCoins(user.id);
      if (currentCoins < item.price) return showToast('XY币不足，去打工赚币吧！', 'error');
      if (!DB.spendCoins(user.id, item.price)) return;

      // ★ 安全网：扣款后二次校验余额（防止极端竞态导致余额变负）
      if (DB.getCoins(user.id) < 0) {
        DB.addCoins(user.id, item.price); // 回滚
        return showToast('操作冲突，请稍后重试', 'error');
      }

      if (itemType === 'boost') {
        const pet = DB.getPet(user.id);
        if (!pet) { DB.addCoins(user.id, item.price); return showToast('请先选择精灵', 'error'); }
        const statKey = item.stat;
        const oldVal = pet[statKey] || 0;
        pet[statKey] = oldVal + 1;
        if (statKey === 'maxHp') pet.hp = Math.min(pet.hp + 1, pet.maxHp);
        const db = DB._read();
        db.pets[user.id] = pet;
        DB._write(db);
        if (SupabaseSync._ready) {
          SupabaseSync._client.from('pets').upsert({
            user_id: user.id, type: pet.type, name: pet.name, birth_time: pet.birthTime,
            hunger: pet.hunger, cleanliness: pet.cleanliness, mood: pet.mood,
            last_tick: pet.lastTick, working: pet.working ? JSON.stringify(pet.working) : null,
            all_zero_since: pet.allZeroSince, dead: pet.dead || false,
            atk: pet.atk, def: pet.def, hp: pet.hp, max_hp: pet.maxHp,
            crit: pet.crit, crit_dmg: pet.critDmg, dodge: pet.dodge,
            weapon: pet.weapon, helmet: pet.helmet, armor: pet.armor, boots: pet.boots,
            cultivating: pet.cultivating ? JSON.stringify(pet.cultivating) : null
          }).then(() => {}, () => {});
        }
        overlay.remove();
        showToast('✅ 「' + item.name + '」使用成功！' + item.statName + ' ' + oldVal + ' → ' + pet[statKey], 'success');
        updateHeaderCoins();
        refreshTabContent();
      } else if (itemType === 'gift') {
        const u = DB.getCurrentUser();
        u.giftBoxes = (u.giftBoxes || 0) + 1;
        const bdb = DB._read();
        const uidx = (bdb.users || []).findIndex(x => x.id === u.id);
        if (uidx >= 0) { bdb.users[uidx].giftBoxes = u.giftBoxes; }
        DB._write(bdb);
        if (SupabaseSync._ready) {
          SupabaseSync._client.from('users').update({ gift_boxes: u.giftBoxes }).eq('id', u.id).then(() => {}, () => {});
        }
        overlay.remove();
        showToast('✅ 获得「礼包盒子」！当前共 ' + u.giftBoxes + ' 个', 'success');
        updateHeaderCoins();
        refreshTabContent();
      } else {
        // 加入背包而非自动使用
        DB.addToBackpack(user.id, {
          type: itemType, name: item.name, icon: item.icon, desc: item.desc,
          hunger: item.hunger || 0, cleanliness: item.cleanliness || 0, mood: item.mood || 0
        });

        showToast('✅ 「' + item.name + '」已加入背包！', 'success');
        updateHeaderCoins();
        overlay.remove();
        refreshTabContent();
      }
    });
  });
}

// ---------- 背包弹窗 ----------
function openBackpackModal() {
  const user = DB.getCurrentUser();
  const items = DB.getBackpack(user.id);

  const equips = items.filter(i => i.type === 'equipment');
  const consumables = items.filter(i => i.type !== 'equipment');
  const slotName = { weapon:'武器', helmet:'头盔', armor:'护甲', boots:'鞋子' };
  const statLabel = { atk:'攻', def:'防', maxHp:'血', dodge:'闪' };
  const slotIcon = { weapon:'⚔️', helmet:'⛑️', armor:'🛡️', boots:'👢' };
  const rarityColor = { epic:'#c77dff', rare:'#7eb8da', common:'#9aa4b2' };
  const rarityBadge = { epic:'★史诗', rare:'☆稀有', common:'' };

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';

  let listHtml = '';
  if (items.length === 0) {
    listHtml = '<div class="empty-state" style="padding:32px 0;"><div class="empty-icon">🎒</div><p>背包空空如也，去商店买点东西吧</p></div>';
  } else {
    listHtml = '<div style="display:flex;flex-direction:column;gap:8px;max-height:50vh;overflow-y:auto;">';
    // 装备区
    const pet = DB.getPet(user.id);
    const equippedBids = pet ? [pet.weapon, pet.helmet, pet.armor, pet.boots].filter(Boolean) : [];
    const unequipped = equips.filter(item => !equippedBids.includes(item.bid));
    if (equips.length > 0) {
      listHtml += '<div style="font-size:12px;color:var(--accent);font-weight:600;padding:4px 0;">⚔️ 装备 (' + unequipped.length + '/' + equips.length + ')</div>';
      equips.forEach(item => {
        const isEquipped = equippedBids.includes(item.bid);
        let parts = [];
        if (item.equipSlot) parts.push(slotName[item.equipSlot] || item.equipSlot);
        if (item.stats) Object.entries(item.stats).forEach(([k,v]) => parts.push((statLabel[k]||k)+'+'+v));
        if (item.affixes && item.affixes.length) item.affixes.forEach(a => parts.push(a.name+'+'+a.val+(a.stat==='critDmg'||a.stat==='crit'?'%':'')));
        listHtml += '<div style="display:flex;align-items:center;gap:10px;padding:10px;background:rgba(255,255,255,0.04);border:1px solid var(--glass-border);border-radius:10px;' + (isEquipped ? 'opacity:0.6;' : '') + '">';
        listHtml += '<span style="font-size:22px;">' + (slotIcon[item.equipSlot] || '📦') + '</span>';
        listHtml += '<div style="flex:1;min-width:0;">';
        listHtml += '<div style="font-size:13px;font-weight:600;">' + escapeHtml(item.name);
        if (isEquipped) listHtml += '<span style="font-size:10px;margin-left:4px;color:var(--accent);background:rgba(126,184,218,0.2);padding:1px 6px;border-radius:4px;">已装备</span>';
        if (item.rarity && item.rarity !== 'common') {
          listHtml += '<span style="font-size:10px;margin-left:4px;color:' + (rarityColor[item.rarity]||'#9aa4b2') + ';">' + (rarityBadge[item.rarity]||'') + '</span>';
        }
        listHtml += '</div>';
        listHtml += '<div style="font-size:11px;color:var(--text-secondary);">' + parts.join(' · ') + '</div>';
        listHtml += '</div>';
        listHtml += '<div style="display:flex;flex-direction:column;gap:3px;">';
        if (isEquipped) {
          listHtml += '<button class="btn btn-ghost btn-sm backpack-use-btn" data-bid="' + item.bid + '" data-item-type="equipment" style="font-size:11px;padding:3px 10px;color:var(--danger);">卸下</button>';
        } else {
          listHtml += '<button class="btn btn-primary btn-sm backpack-use-btn" data-bid="' + item.bid + '" data-item-type="equipment" style="font-size:11px;padding:3px 10px;">装备</button>';
        }
        listHtml += '<button class="btn btn-ghost btn-sm backpack-discard-btn" data-bid="' + item.bid + '" data-item-name="' + escapeHtml(item.name) + '" style="font-size:10px;padding:2px 8px;color:var(--danger);">🗑</button>';
        listHtml += '</div></div>';
      });
    }
    // 消耗品区
    if (consumables.length > 0) {
      listHtml += '<div style="font-size:12px;color:var(--text-secondary);font-weight:600;padding:4px 0;margin-top:' + (equips.length > 0 ? '12' : '0') + 'px;">🎒 消耗品 (' + consumables.length + ')</div>';
      consumables.forEach(item => {
        listHtml += '<div style="display:flex;align-items:center;gap:10px;padding:10px;background:rgba(255,255,255,0.04);border:1px solid var(--glass-border);border-radius:10px;">';
        listHtml += '<span style="font-size:22px;">' + (item.icon || (item.type === 'food' ? '🍞' : item.type === 'clean' ? '🧻' : item.type === 'toy' ? '🧶' : '📦')) + '</span>';
        listHtml += '<div style="flex:1;min-width:0;">';
        listHtml += '<div style="font-size:13px;font-weight:600;">' + escapeHtml(item.name) + '</div>';
        listHtml += '<div style="font-size:11px;color:var(--text-secondary);">';
        listHtml += (item.hunger ? '🍞+' + item.hunger + ' ' : '') + (item.cleanliness ? '🛁+' + item.cleanliness + ' ' : '') + (item.mood ? '💖+' + item.mood : '');
        listHtml += '</div></div>';
        listHtml += '<div style="display:flex;flex-direction:column;gap:3px;">';
        listHtml += '<button class="btn btn-primary btn-sm backpack-use-btn" data-bid="' + item.bid + '" data-item-type="' + (item.type || '') + '" style="font-size:11px;padding:3px 10px;">使用</button>';
        listHtml += '<button class="btn btn-ghost btn-sm backpack-discard-btn" data-bid="' + item.bid + '" data-item-name="' + escapeHtml(item.name) + '" style="font-size:10px;padding:2px 8px;color:var(--danger);">🗑</button>';
        listHtml += '</div></div>';
      });
    }
    listHtml += '</div>';
  }

  overlay.innerHTML = `
    <div class="modal glass-card" style="max-width:500px;">
      <h3>🎒 精灵背包</h3>
      ${listHtml}
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modal-backpack-close">关闭</button>
      </div>
    </div>`;

  document.body.appendChild(overlay);
  overlay.querySelector('#modal-backpack-close').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

  // 使用/装备物品
  overlay.querySelectorAll('.backpack-use-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const bid = btn.dataset.bid;
      const item = items.find(i => i.bid === bid);
      if (!item) return;

      if (item.type === 'equipment') {
        const pet = DB.getPet(user.id);
        const isEquipped = pet && [pet.weapon, pet.helmet, pet.armor, pet.boots].includes(bid);
        if (isEquipped) {
          const slot = Object.entries({ weapon: pet.weapon, helmet: pet.helmet, armor: pet.armor, boots: pet.boots }).find(([k, v]) => v === bid)?.[0];
          const ok = await DB.unequipItem(user.id, slot);
          if (!ok) { showToast('卸下失败，请重试', 'error'); return; }
          showToast(`已卸下「${item.name}」`, 'success');
        } else {
          const ok = await DB.equipItem(user.id, bid);
          if (!ok) { showToast('装备失败，请重试', 'error'); return; }
          showToast(`⚔️ 已装备「${item.name}」！`, 'success');
        }
        overlay.remove();
        refreshTabContent();
        return;
      }

      const pet = DB.getPet(user.id);
      if (!pet) return;
      const now = Date.now();
      let { hunger, cleanliness, mood } = DB.getPetLiveState(user.id);
      DB.updatePet(user.id, {
        lastTick: now,
        hunger: Math.min(100, hunger + (item.hunger || 0)),
        cleanliness: Math.min(100, cleanliness + (item.cleanliness || 0)),
        mood: Math.min(100, mood + (item.mood || 0))
      });
      DB.removeFromBackpack(user.id, bid);

      showToast(`✅ 使用了「${item.name}」！`, 'success');
      overlay.remove();
      refreshTabContent();
    });
  });

  // 丢弃物品
  overlay.querySelectorAll('.backpack-discard-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const bid = btn.dataset.bid;
      const itemName = btn.dataset.itemName || '物品';
      const item = items.find(i => i.bid === bid);
      if (!item) return;
      if (!confirm(`确定丢弃「${itemName}」吗？此操作不可恢复。`)) return;

      if (item.type === 'equipment') {
        const pet = DB.getPet(user.id);
        if (pet && ['weapon','helmet','armor','boots'].some(s => pet[s] === bid)) {
          showToast('请先卸下装备再丢弃', 'error');
          return;
        }
      }

      const ok = await DB.discardItem(user.id, bid);
      if (!ok) { showToast('丢弃失败，请重试', 'error'); return; }
      showToast(`🗑 已丢弃「${itemName}」`, 'success');
      overlay.remove();
      refreshTabContent();
    });
  });
}
// ---------- 笔记分类管理弹窗 ----------
function openNoteCategoryModal() {
  const categories = DB.getNoteCategories();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal glass-card">
      <h3>管理笔记分类</h3>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">
        ${categories.length === 0 ? '<p style="color:var(--text-secondary);font-size:13px;">暂无分类</p>' : ''}
        ${categories.map(c => `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(255,255,255,0.04);border-radius:8px;border:1px solid var(--glass-border);">
            <span style="font-size:14px;">${escapeHtml(c)}</span>
            <button class="btn btn-ghost btn-sm" data-del-note-cat="${escapeHtml(c)}">删除</button>
          </div>
        `).join('')}
      </div>
      <div class="form-group" style="display:flex;gap:8px;">
        <input class="form-input" id="modal-new-note-cat" placeholder="输入新分类名称" style="flex:1;">
        <button class="btn btn-primary btn-sm" id="modal-add-note-cat" flex-shrink:0;">添加</button>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modal-note-cat-close">关闭</button>
      </div>
    </div>`;

  document.body.appendChild(overlay);
  const close = () => { overlay.remove(); refreshTabContent(); };
  overlay.querySelector('#modal-note-cat-close').addEventListener('click', close);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });

  overlay.querySelector('#modal-add-note-cat').addEventListener('click', () => {
    const input = overlay.querySelector('#modal-new-note-cat');
    const cat = input.value.trim();
    if (!cat) return;
    DB.addNoteCategory(cat);
    close();
  });
}

// ===================== 启动 =====================
window.addEventListener('DOMContentLoaded', () => {
  try { initRain(); } catch(e) { console.error('initRain 失败:', e); }
  try { startClock(); } catch(e) { console.error('startClock 失败:', e); }
  try { DB._init(); } catch(e) { console.error('数据初始化失败:', e); }
  try { render(); } catch(e) { console.error('渲染失败:', e); }
  // 安全网：如果渲染失败导致页面空白，1.5 秒后再尝试
  setTimeout(() => {
    const app = document.getElementById('app');
    if (app && !app.innerHTML.trim()) {
      console.warn('检测到空白页面，重新初始化...');
      try { DB._init(); } catch(e) {}
      try { render(); } catch(e) {}
    }
  }, 1500);
});
</script>
