<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XY空间</title>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --glass-bg: rgba(255,255,255,0.07);
  --glass-border: rgba(255,255,255,0.12);
  --glass-shadow: 0 8px 32px rgba(0,0,0,0.35);
  --text-primary: #e8ecf1;
  --text-secondary: #9aa4b2;
  --accent: #7eb8da;
  --accent-hover: #9cd0ef;
  --danger: #e57373;
  --surface: rgba(20,24,38,0.75);
  --radius: 16px;
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
}
body {
  font-family: "PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
  background: #0b0f1a;
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
}

/* ===== Rain Canvas ===== */
#rain-canvas {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 0; pointer-events: none; opacity: 0.55;
}

/* ===== Background ambient glow ===== */
body::before {
  content: '';
  position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
  background: radial-gradient(ellipse at 30% 20%, rgba(70,130,180,0.08) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 70%, rgba(100,140,200,0.06) 0%, transparent 50%),
              radial-gradient(ellipse at 50% 50%, rgba(20,30,50,0.4) 0%, transparent 70%);
  z-index: -1; pointer-events: none;
}

/* ===== Layout ===== */
.container {
  position: relative; z-index: 1; max-width: 960px; margin: 0 auto;
  padding: 24px 20px 60px; min-height: 100vh;
}

/* ===== Frosted Glass Card ===== */
.glass-card {
  background: var(--glass-bg);
  backdrop-filter: blur(24px) saturate(140%);
  -webkit-backdrop-filter: blur(24px) saturate(140%);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  box-shadow: var(--glass-shadow);
  padding: 32px;
  transition: var(--transition);
}
.glass-card:hover { border-color: rgba(255,255,255,0.18); }

/* ===== Header ===== */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px; margin-bottom: 28px;
  background: var(--glass-bg);
  backdrop-filter: blur(24px) saturate(140%);
  -webkit-backdrop-filter: blur(24px) saturate(140%);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  box-shadow: var(--glass-shadow);
  flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.header-brand {
  display: flex; align-items: center; gap: 10px;
}
.header-logo {
  width: 38px; height: 38px; border-radius: 10px;
  background: linear-gradient(135deg, #4a7fa8, #7eb8da);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.header-title { font-size: 20px; font-weight: 600; letter-spacing: 1px; white-space: nowrap; }

/* Clock */
.header-clock {
  font-size: 13px; color: var(--text-secondary); font-variant-numeric: tabular-nums;
  white-space: nowrap; padding: 5px 12px; border-radius: 8px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border);
  letter-spacing: 0.5px;
}
.header-clock .clock-time { color: var(--accent); font-weight: 500; }

/* Sound toggle */
.sound-toggle {
  width: 34px; height: 34px; border-radius: 50%; cursor: pointer;
  background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border);
  display: flex; align-items: center; justify-content: center; font-size: 16px;
  transition: var(--transition); flex-shrink: 0;
}
.sound-toggle:hover { background: rgba(255,255,255,0.12); }
.sound-toggle.on { background: rgba(126,184,218,0.15); border-color: rgba(126,184,218,0.3); }

.header-right { display: flex; align-items: center; gap: 14px; }
.header-user {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.header-user .role-badge {
  font-size: 11px; padding: 4px 10px; border-radius: 20px;
  background: rgba(126,184,218,0.15); color: var(--accent);
  border: 1px solid rgba(126,184,218,0.2);
}

/* ===== Buttons ===== */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 22px; border-radius: 10px; font-size: 14px;
  font-weight: 500; cursor: pointer; border: none;
  transition: var(--transition); letter-spacing: 0.5px;
  text-decoration: none; font-family: inherit;
}
.btn-primary {
  background: linear-gradient(135deg, #4a7fa8, #6a9fc8);
  color: #fff; box-shadow: 0 4px 14px rgba(74,127,168,0.3);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(74,127,168,0.4); }
.btn-ghost {
  background: rgba(255,255,255,0.06); color: var(--text-primary);
  border: 1px solid var(--glass-border);
}
.btn-ghost:hover { background: rgba(255,255,255,0.12); }
.btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 8px; }
.btn-danger { background: rgba(229,115,115,0.2); color: var(--danger); border: 1px solid rgba(229,115,115,0.25); }
.btn-danger:hover { background: rgba(229,115,115,0.3); }
.btn-icon {
  width: 34px; height: 34px; padding: 0; display: flex; align-items: center; justify-content: center;
  border-radius: 10px; background: transparent; color: var(--text-secondary); border: 1px solid var(--glass-border); cursor: pointer;
  transition: var(--transition);
}
.btn-icon:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }

/* ===== Form ===== */
.form-group { margin-bottom: 20px; }
.form-label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; letter-spacing: 0.5px; }
.form-input, .form-textarea, .form-select {
  width: 100%; padding: 12px 16px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--glass-border);
  border-radius: 10px; color: var(--text-primary);
  font-size: 14px; font-family: inherit;
  transition: var(--transition); outline: none;
}
.form-input:focus, .form-textarea:focus, .form-select:focus {
  border-color: var(--accent); box-shadow: 0 0 0 3px rgba(126,184,218,0.1);
}
.form-input::placeholder, .form-textarea::placeholder { color: rgba(255,255,255,0.2); }
.form-textarea { min-height: 100px; resize: vertical; }
.form-select { cursor: pointer; }
.form-select option { background: #1a2030; color: #e8ecf1; }
.form-hint { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }

/* ===== Auth Pages ===== */
.auth-wrapper {
  display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;
}
.auth-card {
  width: 100%; max-width: 420px; padding: 40px 36px; text-align: center;
}
.auth-card .header-logo { margin: 0 auto 16px; width: 52px; height: 52px; font-size: 24px; border-radius: 14px; }
.auth-card h2 { font-size: 24px; margin-bottom: 24px; font-weight: 600; }
.auth-tabs { display: flex; gap: 0; margin-bottom: 28px; border-radius: 10px; overflow: hidden; border: 1px solid var(--glass-border); }
.auth-tab {
  flex: 1; padding: 10px; text-align: center; cursor: pointer;
  font-size: 14px; background: transparent; color: var(--text-secondary);
  border: none; font-family: inherit; transition: var(--transition);
}
.auth-tab.active { background: rgba(126,184,218,0.15); color: var(--accent); }
.auth-toggle { margin-top: 20px; font-size: 13px; color: var(--text-secondary); }
.auth-toggle a { color: var(--accent); cursor: pointer; text-decoration: none; }
.auth-toggle a:hover { text-decoration: underline; }
.toast {
  position: fixed; top: 24px; left: 50%; transform: translateX(-50%); z-index: 999;
  padding: 12px 24px; border-radius: 10px; font-size: 14px;
  background: rgba(30,36,50,0.95); border: 1px solid var(--glass-border);
  backdrop-filter: blur(12px); color: var(--text-primary);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.4s forwards;
  pointer-events: none;
}
.toast.success { border-color: rgba(126,184,218,0.4); }
.toast.error { border-color: rgba(229,115,115,0.4); }
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

/* ===== Dashboard Tabs ===== */
.dash-tabs {
  display: flex; gap: 6px; margin-bottom: 24px;
  flex-wrap: wrap; padding: 4px;
  background: var(--glass-bg);
  backdrop-filter: blur(24px) saturate(140%);
  -webkit-backdrop-filter: blur(24px) saturate(140%);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
}
.dash-tab {
  flex: 1; min-width: 80px; padding: 12px 16px; text-align: center;
  border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 500;
  color: var(--text-secondary); border: none; background: transparent;
  font-family: inherit; transition: var(--transition); white-space: nowrap;
}
.dash-tab.active { background: rgba(126,184,218,0.15); color: var(--accent); }
.dash-tab:hover:not(.active) { background: rgba(255,255,255,0.04); }

/* ===== Section Header ===== */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
}
.section-header h3 { font-size: 18px; font-weight: 600; }

/* ===== Category Filter ===== */
.cat-filter {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px;
}
.cat-chip {
  padding: 5px 14px; border-radius: 20px; font-size: 12px; cursor: pointer;
  background: rgba(255,255,255,0.04); color: var(--text-secondary);
  border: 1px solid var(--glass-border); transition: var(--transition);
  font-family: inherit;
}
.cat-chip.active { background: rgba(126,184,218,0.15); color: var(--accent); border-color: rgba(126,184,218,0.25); }
.cat-chip:hover:not(.active) { background: rgba(255,255,255,0.08); }

/* ===== Note Cards ===== */
.note-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.note-card {
  background: var(--glass-bg);
  backdrop-filter: blur(20px) saturate(130%);
  -webkit-backdrop-filter: blur(20px) saturate(130%);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius); padding: 20px;
  transition: var(--transition); position: relative; cursor: pointer;
}
.note-card:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.3); }
.note-card .note-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
.note-card .note-title { font-size: 16px; font-weight: 600; flex: 1; margin-right: 8px; }
.note-card .note-visibility {
  font-size: 11px; padding: 3px 8px; border-radius: 6px; flex-shrink: 0;
}
.vis-public { background: rgba(126,184,218,0.15); color: var(--accent); }
.vis-private { background: rgba(255,255,255,0.06); color: var(--text-secondary); }
.note-card .note-preview { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; white-space: pre-wrap; word-break: break-word; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
.note-card .note-meta { font-size: 11px; color: rgba(255,255,255,0.3); display: flex; justify-content: space-between; align-items: center; }
.note-card .note-actions { display: flex; gap: 6px; }
.note-card .note-hint { font-size: 11px; color: var(--accent); opacity: 0.7; }
.note-card.pending { border-color: rgba(255,200,50,0.3); background: rgba(255,200,50,0.04); }
.note-card.pending .note-status-pending { display: inline-block; font-size: 11px; color: #e0b44a; background: rgba(224,180,74,0.12); padding: 2px 8px; border-radius: 4px; margin-bottom: 6px; }
.note-card.approved .note-status-approved { display: inline-block; font-size: 11px; color: #6bc08a; background: rgba(107,192,138,0.1); padding: 2px 8px; border-radius: 4px; margin-bottom: 6px; }

/* Note detail modal content */
.note-detail-content { white-space: pre-wrap; word-break: break-word; line-height: 1.8; }
.note-detail-meta { font-size: 12px; color: var(--text-secondary); margin: 16px 0; padding-top: 16px; border-top: 1px solid var(--glass-border); }
.note-detail-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 8px; }

/* ===== Link Cards (with favicon) ===== */
.link-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.link-card {
  display: flex; align-items: center; gap: 12px;
  background: var(--glass-bg);
  backdrop-filter: blur(20px) saturate(130%);
  -webkit-backdrop-filter: blur(20px) saturate(130%);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius); padding: 14px 16px;
  text-decoration: none; color: var(--text-primary);
  transition: var(--transition); position: relative;
}
.link-card:hover { border-color: rgba(255,255,255,0.22); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.3); }
.link-card .link-favicon {
  width: 36px; height: 36px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0; overflow: hidden;
  background: rgba(126,184,218,0.1);
}
.link-card .link-favicon img { width: 22px; height: 22px; object-fit: contain; }
.link-card .link-info { flex: 1; min-width: 0; }
.link-card .link-name { font-size: 14px; font-weight: 600; }
.link-card .link-meta { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
.link-card .link-desc { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.link-card .link-cat { font-size: 10px; padding: 2px 7px; border-radius: 4px; background: rgba(126,184,218,0.1); color: var(--accent); flex-shrink: 0; }

/* ===== Message Cards ===== */
.message-list { display: flex; flex-direction: column; gap: 12px; }
.message-card {
  background: var(--glass-bg);
  backdrop-filter: blur(20px) saturate(130%);
  -webkit-backdrop-filter: blur(20px) saturate(130%);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius); padding: 20px;
  transition: var(--transition);
}
.message-card .msg-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; color: var(--text-secondary); }
.message-card .msg-body { font-size: 14px; white-space: pre-wrap; }
.message-card .msg-from { color: var(--accent); }

/* ===== Modal ===== */
.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.55); z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  width: 100%; max-width: 560px; max-height: 85vh; overflow-y: auto;
  animation: modalSlide 0.25s ease;
}
@keyframes modalSlide { from { opacity: 0; transform: translateY(12px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
.modal h3 { margin-bottom: 20px; font-size: 18px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }

/* ===== Visibility Toggle ===== */
.vis-toggle {
  display: flex; gap: 0; border-radius: 8px; overflow: hidden;
  border: 1px solid var(--glass-border); width: fit-content;
}
.vis-option {
  padding: 7px 16px; font-size: 12px; cursor: pointer; background: transparent;
  color: var(--text-secondary); border: none; font-family: inherit;
  transition: var(--transition);
}
.vis-option.active { background: rgba(126,184,218,0.15); color: var(--accent); }

/* ===== Empty State ===== */
.empty-state {
  text-align: center; padding: 48px 20px; color: var(--text-secondary);
}
.empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
.empty-state p { font-size: 14px; }

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }

/* ===== Responsive ===== */
@media (max-width: 768px) {
  /* Container */
  .container { padding: 12px 10px 40px; }

  /* Glass cards */
  .glass-card { padding: 18px 14px; }
  .auth-card { padding: 24px 18px; }

  /* Header */
  .header { padding: 10px 14px; margin-bottom: 16px; }
  .header-left { flex-direction: column; align-items: flex-start; gap: 6px; }
  .header-right { gap: 8px; }
  .header-title { font-size: 16px; }
  .header-logo { width: 30px; height: 30px; font-size: 14px; }
  .header-clock { font-size: 11px; padding: 4px 8px; }
  .header-user { font-size: 12px; }
  .header-user .role-badge { font-size: 10px; padding: 3px 8px; }

  /* Buttons */
  .btn { padding: 8px 16px; font-size: 13px; }
  .btn-sm { padding: 5px 10px; font-size: 11px; }

  /* Tabs - compact on mobile */
  .dash-tabs { gap: 3px; padding: 3px; border-radius: 10px; }
  .dash-tab {
    flex: 1 1 auto; min-width: 0; padding: 8px 10px;
    font-size: 11px; border-radius: 7px;
  }

  /* Section header */
  .section-header { flex-direction: column; gap: 8px; }
  .section-header h3 { font-size: 16px; }

  /* Category filter */
  .cat-filter { gap: 4px; }
  .cat-chip { padding: 4px 10px; font-size: 11px; }

  /* Grids to single column */
  .note-grid { grid-template-columns: 1fr; }
  .link-grid { grid-template-columns: 1fr; }

  /* Note cards */
  .note-card { padding: 16px; }
  .note-card .note-title { font-size: 14px; }

  /* Modal - full screen on mobile */
  .modal-overlay { padding: 8px; align-items: flex-end; }
  .modal {
    max-width: 100%; max-height: 92vh; border-radius: 16px 16px 0 0;
    padding: 20px 16px;
  }
  .modal h3 { font-size: 16px; margin-bottom: 14px; }
  .modal-actions { flex-direction: column; gap: 8px; }
  .modal-actions .btn { width: 100%; justify-content: center; }

  /* Form */
  .form-input, .form-textarea, .form-select { padding: 10px 12px; font-size: 13px; }
  .form-group { margin-bottom: 14px; }

  /* Pet */
  .pet-sprite { font-size: 64px; }
  .pet-select-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .pet-select-card { padding: 14px 8px; }
  .pet-select-card .select-sprite { font-size: 40px; }
  .pet-actions { gap: 6px; }
  .pet-action-btn { padding: 8px 12px; font-size: 11px; min-width: 56px; }
  .pet-action-btn .action-icon { font-size: 20px; }
  .pet-stats { max-width: 100%; }
  .stat-row { font-size: 12px; gap: 6px; }
  .stat-label { width: 40px; font-size: 11px; }
  .stat-val { width: 28px; font-size: 11px; }

  /* Toast */
  .toast { left: 10px; right: 10px; transform: none; text-align: center; font-size: 13px; }
  @keyframes toastInMobile { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  .toast { animation: toastInMobile 0.3s ease, toastOut 0.3s ease 2.4s forwards; }

  /* Leaderboard */
  .leaderboard-table { font-size: 12px; }
  .leaderboard-table th, .leaderboard-table td { padding: 8px 6px; }

  /* Auth */
  .auth-wrapper { padding: 12px; align-items: flex-start; padding-top: 40px; }
  .auth-tab { padding: 8px; font-size: 13px; }

  /* Message cards */
  .message-card { padding: 14px; }
  .message-card .msg-body { font-size: 13px; }

  /* Visibility toggle */
  .vis-option { padding: 5px 10px; font-size: 11px; }

  /* Empty state */
  .empty-state { padding: 30px 12px; }
  .empty-state .empty-icon { font-size: 36px; }
}

/* Extra small screens */
@media (max-width: 400px) {
  .dash-tab { font-size: 10px; padding: 6px 8px; }
  .pet-sprite { font-size: 52px; }
  .pet-select-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
  .pet-select-card .select-sprite { font-size: 34px; }
  .pet-select-card .select-name { font-size: 12px; }
  .pet-action-btn { padding: 6px 10px; font-size: 10px; min-width: 48px; }
  .pet-action-btn .action-icon { font-size: 18px; }
  .header-title { font-size: 14px; }
  .header-logo { width: 26px; height: 26px; font-size: 12px; }
  .note-card .note-title { font-size: 13px; }
}
.pet-container { text-align: center; }
.pet-display {
  position: relative; display: inline-block; margin: 0 auto;
  animation: petFloat 3s ease-in-out infinite;
}
@keyframes petFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.pet-sprite {
  font-size: 96px; line-height: 1.2; cursor: pointer; user-select: none;
  transition: transform 0.2s; filter: drop-shadow(0 8px 24px rgba(126,184,218,0.25));
}
.pet-sprite:hover { transform: scale(1.08); }
.pet-sprite:active { transform: scale(0.95); }
.pet-name {
  font-size: 16px; font-weight: 600; margin-top: 4px;
  color: var(--accent);
}
.pet-age { font-size: 12px; color: var(--text-secondary); }

.pet-stats { max-width: 380px; margin: 20px auto 0; }
.stat-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  font-size: 13px; white-space: nowrap; flex-wrap: nowrap;
}
.stat-label { width: 56px; text-align: right; color: var(--text-secondary); flex-shrink: 0; }
.stat-bar-wrap {
  flex: 1; height: 8px; background: rgba(255,255,255,0.06);
  border-radius: 4px; overflow: hidden;
}

  height: 100%; border-radius: 4px; transition: width 0.5s ease, background 0.5s ease;
}
.stat-val { width: 36px; font-size: 12px; color: var(--text-secondary); text-align: right; }
.stat-good { background: linear-gradient(90deg, #6bc08a, #7ecb94); }
.stat-warn { background: linear-gradient(90deg, #e0b44a, #ecc85c); }
.stat-bad { background: linear-gradient(90deg, #e57373, #ef8a8a); }

.pet-actions {
  display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap;
}
.pet-action-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 12px 18px; border-radius: 14px; cursor: pointer;
  background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
  color: var(--text-primary); font-size: 12px; font-family: inherit;

/* Pet Selection */
.pet-select-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; }
.pet-select-card {
  padding: 20px 14px; text-align: center; cursor: pointer;
  background: rgba(255,255,255,0.04); border: 2px solid var(--glass-border);
  border-radius: var(--radius); transition: var(--transition);
}
.pet-select-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.pet-select-card .select-sprite { font-size: 56px; }
.pet-select-card .select-name { font-size: 14px; font-weight: 600; margin: 6px 0 2px; }

<body>

<canvas id="rain-canvas"></canvas>

<div id="app"></div>
<div id="toast-container"></div>

<script>
/* ========================================================================
   XY空间 v2 — 单文件全栈个人网站
   数据存储于 localStorage，可部署到任意静态托管
   ======================================================================== */

// 错误诊断
window.onerror = function(msg, url, line, col, err) {
  const app = document.getElementById('app');
  app.innerHTML = '<div style="color:red;padding:20px;font-size:16px;">' +
    '<h2>JavaScript 错误</h2>' +
    '<p>' + msg + '</p>' +
    '<p>行: ' + line + ', 列: ' + col + '</p>' +
    (err && err.stack ? '<pre>' + err.stack + '</pre>' : '') +
    '<p style="margin-top:20px;">请清除 localStorage 后重试</p>' +
    '<button onclick="localStorage.clear();location.reload();" style="padding:10px 20px;background:#e57373;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;">清除 localStorage 并刷新</button>' +
    '</div>';
  return true;
};

// ===================== 数据层 =====================
const DB = {
  _key: 'xy_space_db',
  _init() {
    if (!localStorage.getItem(this._key)) {
      const defaultData = {
        users: [
          { id: 'u_admin', username: 'maxinyu', password: this._hash('2048'), role: 'admin', ip: '', createdAt: Date.now() }
        ],
        notes: [],
        links: [],
        linkCategories: [],
        noteCategories: [],
        messages: [],
        pets: {},
        coins: {},
        backpacks: {},
        currentUserId: null
      };
      localStorage.setItem(this._key, JSON.stringify(defaultData));
    } else {
      // 兼容旧数据 & 迁移
      const db = this._read();
      if (!db.linkCategories) db.linkCategories = [];
      if (!db.linkCategory) db.linkCategory = 'all';
      if (!db.noteCategories) db.noteCategories = [];
      if (!db.pets) db.pets = {};
      if (!db.coins) db.coins = {};
      if (!db.backpacks) db.backpacks = {};
      // 迁移：确保管理员账户为 maxinyu/2048
      if (db.users) {
        const adminUser = db.users.find(u => u.role === 'admin');
        if (adminUser && (adminUser.username !== 'maxinyu' || adminUser.password !== this._hash('2048'))) {
          adminUser.username = 'maxinyu';
          adminUser.password = this._hash('2048');
        }
      }
      this._write(db);
    }
  },
  _read() { return JSON.parse(localStorage.getItem(this._key)); },
  _write(data) {
    localStorage.setItem(this._key, JSON.stringify(data));
    // Supabase 云同步：写操作后延迟批量推送（防抖5秒）
    this._scheduleCloudSync();
  },
  _cloudSyncTimeout: null,
  _scheduleCloudSync() {
    if (this._cloudSyncTimeout) clearTimeout(this._cloudSyncTimeout);
    this._cloudSyncTimeout = setTimeout(() => {
      if (SupabaseSync._ready) SupabaseSync.pushFullSnapshot();
    }, 300);
  },
  _hash(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) { h = ((h << 5) - h + str.charCodeAt(i)) | 0; }
    return 'xy_' + Math.abs(h).toString(36);
  },

  // 用户
  register(username, password, ip) {
    const db = this._read();
    if (db.users.find(u => u.username === username)) return { ok: false, msg: '用户名已存在' };
    const user = { id: 'u_' + Date.now(), username, password: this._hash(password), role: 'user', createdAt: Date.now(), ip: ip || '' };
    db.users.push(user);
    this._write(db);
    return { ok: true, user };
  },
  login(username, password) {
    const db = this._read();
    const user = db.users.find(u => u.username === username && u.password === this._hash(password));
    if (!user) return { ok: false, msg: '用户名或密码错误' };
    db.currentUserId = user.id;
    this._write(db);
    return { ok: true, user };
  },
  logout() {
    const db = this._read();
    db.currentUserId = null;
    this._write(db);
  },
  getCurrentUser() {
    const db = this._read();
    return db.users.find(u => u.id === db.currentUserId) || null;
  },
  isAdmin() {
    const u = this.getCurrentUser();
    return u && u.role === 'admin';
  },
  getAllUsers() {
    return this._read().users || [];
  },
  // 删除用户及其所有数据（管理员操作）
  async deleteUser(userId) {
    const db = this._read();
    const user = (db.users || []).find(u => u.id === userId);
    if (!user) return false;
    if (user.role === 'admin') return false;

    // 先从 Supabase 删除（必须在更新 localStorage 之前完成）
    if (SupabaseSync._ready) {
      const tableNames = ['users', 'notes', 'links', 'messages', 'pets', 'coins', 'backpack_items'];
      const results = await Promise.allSettled([
        SupabaseSync._client.from('users').delete().eq('id', userId),
        SupabaseSync._client.from('notes').delete().eq('author_id', userId),
        SupabaseSync._client.from('links').delete().eq('added_by', userId),
        SupabaseSync._client.from('messages').delete().eq('author_id', userId),
        SupabaseSync._client.from('pets').delete().eq('user_id', userId),
        SupabaseSync._client.from('coins').delete().eq('user_id', userId),
        SupabaseSync._client.from('backpack_items').delete().eq('user_id', userId)
      ]);

      // 检查每个 DELETE 操作的结果（Supabase 客户端不会 reject，而是返回 { error }）
      let hasError = false;
      results.forEach((r, i) => {
        if (r.status === 'rejected') {
          console.error(`❌ Supabase 删除 ${tableNames[i]} 失败（网络错误）:`, r.reason);
          hasError = true;
        } else if (r.value && r.value.error) {
          console.error(`❌ Supabase 删除 ${tableNames[i]} 失败:`, r.value.error.message || r.value.error);
          hasError = true;
        }
      });

      if (hasError) {
        console.error('⚠️ Supabase 删除未完全成功，可能的原因：anon key 无 DELETE 权限，请在 Supabase 控制台检查各表的 RLS 策略是否包含 DELETE 操作');
        return false;
      }

      // 清除推送哈希，防止下次同步把已删数据推回去
      SupabaseSync._lastPushedHash = '';
    }

    // 再从 localStorage 删除
    db.users = db.users.filter(u => u.id !== userId);
    db.notes = (db.notes || []).filter(n => n.authorId !== userId);
    db.links = (db.links || []).filter(l => l.addedBy !== userId);
    db.messages = (db.messages || []).filter(m => m.authorId !== userId);
    if (db.pets) delete db.pets[userId];
    if (db.coins) delete db.coins[userId];
    if (db.backpacks) delete db.backpacks[userId];
    // 直接写 localStorage，不触发 _scheduleCloudSync（避免 10s 后 pushFullSnapshot）
    localStorage.setItem(this._key, JSON.stringify(db));
    return true;
  },

  // 笔记
  getNotes(filter, category) {
    const db = this._read();
    const user = this.getCurrentUser();
    const isAdmin = user && user.role === 'admin';
    let notes = db.notes;
    if (filter === 'mine') {
      notes = notes.filter(n => n.authorId === user.id);
    } else if (filter === 'pending') {
      // 管理员查看待审核笔记
      notes = notes.filter(n => n.status === 'pending');
    } else if (filter === 'public') {
      notes = notes.filter(n => {
        if (n.visibility !== 'public') return false;
        if (isAdmin) return true;           // 管理员看全部公开笔记
        if (n.authorId === user.id) return true; // 作者看自己的
        return n.status === 'approved';     // 其他人只看已审核通过的
      });
    } else if (filter === 'featured') {
      notes = notes.filter(n => n.featured === true);
    } else {
      // 'all'：公开已审核 + 自己的全部笔记
      notes = notes.filter(n => {
        if (n.authorId === user.id) return true;
        if (isAdmin) return n.visibility === 'public';
        return n.visibility === 'public' && n.status === 'approved';
      });
    }
    if (category && category !== 'all') notes = notes.filter(n => n.category === category);
    return notes.sort((a, b) => b.updatedAt - a.updatedAt);
  },
  addNote(title, content, visibility, category) {
    const db = this._read();
    const user = this.getCurrentUser();
    const isAdmin = user && user.role === 'admin';
    // 非管理员的公开笔记需审核，管理员/私有笔记自动通过
    const status = (visibility === 'public' && !isAdmin) ? 'pending' : 'approved';
    const note = { id: 'n_' + Date.now(), title, content, visibility, category: category || '未分类', authorId: user.id, authorName: user.username, status, createdAt: Date.now(), updatedAt: Date.now() };
    db.notes.push(note);
    this._write(db);
    return note;
  },
  updateNote(id, title, content, visibility, category) {
    const db = this._read();
    const note = db.notes.find(n => n.id === id);
    if (!note) return false;
    const user = this.getCurrentUser();
    const isAdmin = user && user.role === 'admin';
    // 非管理员编辑公开笔记 → 重新进入审核
    if (visibility === 'public' && !isAdmin) note.status = 'pending';
    note.title = title; note.content = content; note.visibility = visibility; note.category = category || note.category; note.updatedAt = Date.now();
    this._write(db);
    return true;
  },
  toggleFeatured(noteId) {
    const db = this._read();
    const note = db.notes.find(n => n.id === noteId);
    if (!note) return false;
    const admin = this.getCurrentUser();
    if (note.featured) {
      note.featured = false;
      note.featuredBy = null;
      note.featuredAt = null;
      this._write(db);
      return { featured: false, authorId: note.authorId, coins: 0 };
    } else {
      note.featured = true;
      note.featuredBy = admin.id;
      note.featuredAt = Date.now();
      // 给作者奖励200 XY币
      if (!db.coins) db.coins = {};
      db.coins[note.authorId] = (db.coins[note.authorId] || 0) + 200;
      this._write(db);
      return { featured: true, authorId: note.authorId, coins: 200 };
    }
  },
  deleteNote(id) {
    // 先从 Supabase 删除，再从本地删除（防止同步恢复）
    if (SupabaseSync._ready) {
      SupabaseSync._client.from('notes').delete().eq('id', id).then(res => {
        if (res.error) console.warn('Supabase 删除笔记失败:', res.error.message);
      });
      SupabaseSync._lastPushedHash = '';
    }
    const db = this._read();
    db.notes = db.notes.filter(n => n.id !== id);
    localStorage.setItem(this._key, JSON.stringify(db));
  },
  getNoteCategories() {
    const db = this._read();
    return db.noteCategories || [];
  },
  addNoteCategory(name) {
    const db = this._read();
    if (!db.noteCategories) db.noteCategories = [];
    if (!db.noteCategories.includes(name)) {
      db.noteCategories.push(name);
      this._write(db);
    }
  },
  deleteNoteCategory(name) {
    const db = this._read();
    if (!db.noteCategories) return;
    db.noteCategories = db.noteCategories.filter(c => c !== name);
    // 该分类下的笔记移入「未分类」
    db.notes.forEach(n => { if (n.category === name) n.category = '未分类'; });
    this._write(db);
  },

  // 审核笔记（管理员）
  approveNote(noteId) {
    const db = this._read();
    const note = db.notes.find(n => n.id === noteId);
    if (!note) return false;
    note.status = 'approved';
    note.updatedAt = Date.now();
    this._write(db);
    return true;
  },
  rejectNote(noteId) {
    // 驳回 = 删除（先从 Supabase 删除，再从本地删除）
    if (SupabaseSync._ready) {
      SupabaseSync._client.from('notes').delete().eq('id', noteId).then(res => {
        if (res.error) console.warn('Supabase 删除笔记失败:', res.error.message);
      });
      SupabaseSync._lastPushedHash = '';
    }
    const db = this._read();
    db.notes = db.notes.filter(n => n.id !== noteId);
    localStorage.setItem(this._key, JSON.stringify(db));
    return true;
  },

  // 链接
  getLinks(category) {
    const links = this._read().links;
    if (!category || category === 'all') return links.sort((a, b) => b.createdAt - a.createdAt);
    return links.filter(l => l.category === category).sort((a, b) => b.createdAt - a.createdAt);
  },
  addLink(name, url, desc, category) {
    const db = this._read();
    const link = {
      id: 'l_' + Date.now(), name,
      url: url.startsWith('http') ? url : 'https://' + url,
      desc, category: category || '未分类',
      addedBy: this.getCurrentUser().id, createdAt: Date.now()
    };
    db.links.push(link);
    this._write(db);
    return link;
  },
  deleteLink(id) {
    if (SupabaseSync._ready) {
      SupabaseSync._client.from('links').delete().eq('id', id).then(res => {
        if (res.error) console.warn('Supabase 删除链接失败:', res.error.message);
      });
      SupabaseSync._lastPushedHash = '';
    }
    const db = this._read();
    db.links = db.links.filter(l => l.id !== id);
    localStorage.setItem(this._key, JSON.stringify(db));
  },
  getLinkCategories() {
    const db = this._read();
    return db.linkCategories || [];
  },
  addLinkCategory(name) {
    const db = this._read();
    if (!db.linkCategories.includes(name)) {
      db.linkCategories.push(name);
      this._write(db);
    }
  },
  deleteLinkCategory(name) {
    const db = this._read();
    db.linkCategories = db.linkCategories.filter(c => c !== name);
    // 把该分类下的链接移到「未分类」
    db.links.forEach(l => { if (l.category === name) l.category = '未分类'; });
    this._write(db);
  },

  // 留言
  addMessage(content) {
    const db = this._read();
    const user = this.getCurrentUser();
    const msg = { id: 'm_' + Date.now(), content, authorId: user.id, authorName: user.username, createdAt: Date.now() };
    db.messages.push(msg);
    this._write(db);
    return msg;
  },
  getMessages() { return this._read().messages.sort((a, b) => b.createdAt - a.createdAt); },
  deleteMessage(id) {
    if (SupabaseSync._ready) {
      SupabaseSync._client.from('messages').delete().eq('id', id).then(res => {
        if (res.error) console.warn('Supabase 删除留言失败:', res.error.message);
      });
      SupabaseSync._lastPushedHash = '';
    }
    const db = this._read();
    db.messages = db.messages.filter(m => m.id !== id);
    localStorage.setItem(this._key, JSON.stringify(db));
  },

  // 精灵宠物
  getPet(userId) {
    const db = this._read();
    if (!db.pets) db.pets = {};
    return db.pets[userId] || null;
  },
  createPet(userId, type, name) {
    const db = this._read();
    if (!db.pets) db.pets = {};
    const now = Date.now();
    db.pets[userId] = { type, name, birthTime: now, hunger: 100, cleanliness: 100, mood: 100, lastTick: now, working: null, allZeroSince: null, dead: false };
    // 初始化金币（首次领养送 200 XY币）
    if (!db.coins) db.coins = {};
    if (!db.coins[userId]) db.coins[userId] = 200;
    // 初始化背包
    if (!db.backpacks) db.backpacks = {};
    if (!db.backpacks[userId]) db.backpacks[userId] = [];
    this._write(db);
    return db.pets[userId];
  },
  updatePet(userId, updates) {
    const db = this._read();
    if (!db.pets || !db.pets[userId]) return;
    // 总是更新 lastTick，确保跨设备增量同步能检测到变更
    updates.lastTick = Date.now();
    Object.assign(db.pets[userId], updates);
    this._write(db);
  },
  deletePet(userId) {
    // 先从 Supabase 删除宠物和背包数据
    if (SupabaseSync._ready) {
      Promise.allSettled([
        SupabaseSync._client.from('pets').delete().eq('user_id', userId),
        SupabaseSync._client.from('backpack_items').delete().eq('user_id', userId)
      ]).then(results => {
        results.forEach((r, i) => {
          if (r.status === 'rejected') console.warn('Supabase 删除宠物数据失败:', r.reason);
          else if (r.value && r.value.error) console.warn('Supabase 删除宠物数据失败:', r.value.error.message);
        });
      });
      SupabaseSync._lastPushedHash = '';
    }
    const db = this._read();
    if (db.pets) delete db.pets[userId];
    // XY币与账户绑定，不受宠物重新选择影响
    if (db.backpacks) delete db.backpacks[userId];
    localStorage.setItem(this._key, JSON.stringify(db));
  },
  getCoins(userId) {
    const db = this._read();
    if (!db.coins) db.coins = {};
    return db.coins[userId] || 0;
  },
  addCoins(userId, amount) {
    const db = this._read();
    if (!db.coins) db.coins = {};
    db.coins[userId] = (db.coins[userId] || 0) + amount;
    this._write(db);
  },
  spendCoins(userId, amount) {
    const db = this._read();
    if (!db.coins) db.coins = {};
    if ((db.coins[userId] || 0) < amount) return false;
    db.coins[userId] -= amount;
    this._write(db);
    return true;
  },
  // 开始打工
  startWork(userId, hours) {
    const pet = this.getPet(userId);
    if (!pet || pet.working) return false;
    const startTime = Date.now();
    this.updatePet(userId, { working: { hours, startTime } });
    return true;
  },
  // 检查并完成打工（领取收益）
  checkWork(userId) {
    const pet = this.getPet(userId);
    if (!pet || !pet.working) return null;
    const elapsed = (Date.now() - pet.working.startTime) / (1000 * 60 * 60);
    if (elapsed >= pet.working.hours) {
      const opt = WORK_OPTIONS.find(o => o.hours === pet.working.hours);
      const coins = opt ? opt.coins : pet.working.hours * 25;
      this.addCoins(userId, coins);
      this.updatePet(userId, { working: null });
      return { coins };
    }
    return null; // 还在打工中
  },
  // 取消打工（0收益）
  cancelWork(userId) {
    const pet = this.getPet(userId);
    if (!pet || !pet.working) return false;
    this.updatePet(userId, { working: null });
    return true;
  },
  // 背包
  getBackpack(userId) {
    const db = this._read();
    if (!db.backpacks) db.backpacks = {};
    return db.backpacks[userId] || [];
  },
  addToBackpack(userId, item) {
    const db = this._read();
    if (!db.backpacks) db.backpacks = {};
    if (!db.backpacks[userId]) db.backpacks[userId] = [];
    db.backpacks[userId].push({ ...item, bid: 'b_' + Date.now() });
    this._write(db);
  },
  removeFromBackpack(userId, bid) {
    const db = this._read();
    if (!db.backpacks || !db.backpacks[userId]) return false;
    db.backpacks[userId] = db.backpacks[userId].filter(i => i.bid !== bid);
    this._write(db);
    return true;
  },
  // 计算精灵衰减后的实时状态（不写库，仅用于显示）
  getPetLiveState(userId) {
    const pet = this.getPet(userId);
    if (!pet) return null;
    const now = Date.now();
    const elapsedHours = (now - pet.lastTick) / (1000 * 60 * 60);
    const decayRate = 4; // 正常衰减速度：每小时降低4点
    const decay = elapsedHours * decayRate;
    const hunger = Math.max(0, Math.round(pet.hunger - decay));
    const cleanliness = Math.max(0, Math.round(pet.cleanliness - decay));
    const mood = Math.max(0, Math.round(pet.mood - decay * 0.8));
    const anyZero = hunger === 0 || cleanliness === 0 || mood === 0;

    // 死亡检测：任意一项数值归零后开始计时，持续48小时则死亡
    if (anyZero) {
      if (!pet.allZeroSince) {
        this.updatePet(userId, { allZeroSince: now });
        pet.allZeroSince = now;
      }
      const deadHours = (now - pet.allZeroSince) / (1000 * 60 * 60);
      if (deadHours >= 48) {
        this.updatePet(userId, { dead: true });
        return { ...pet, hunger, cleanliness, mood, ageMs: now - pet.birthTime, dead: true };
      }
    } else if (pet.allZeroSince) {
      // 所有数值恢复后清零计时
      this.updatePet(userId, { allZeroSince: null });
      pet.allZeroSince = null;
    }

    return {
      ...pet,
      hunger, cleanliness, mood,
      ageMs: now - pet.birthTime
    };
  },

  // 检查精灵是否已死亡
  isPetDead(userId) {
    const pet = this.getPet(userId);
    return pet && pet.dead === true;
  },

  // 排行榜数据
  getLeaderboardData() {
    const db = this._read();
    const usernameMap = {};
    (db.users || []).forEach(u => { usernameMap[u.id] = u.username; });

    // 金币排行
    const coinRank = [];
    if (db.coins) {
      for (const [uid, coins] of Object.entries(db.coins)) {
        if (coins > 0) {
          coinRank.push({ userId: uid, username: usernameMap[uid] || '未知用户', coins });
        }
      }
    }
    coinRank.sort((a, b) => b.coins - a.coins);

    // 陪伴时间排行（取当前活着的宠物）
    const timeRank = [];
    if (db.pets) {
      const now = Date.now();
      for (const [uid, pet] of Object.entries(db.pets)) {
        if (pet.dead) continue;
        const ageMs = now - pet.birthTime;
        timeRank.push({
          userId: uid,
          username: usernameMap[uid] || '未知用户',
          petName: pet.name,
          type: pet.type,
          ageMs
        });
      }
    }
    timeRank.sort((a, b) => b.ageMs - a.ageMs);

    // 加精排行（被加精的笔记数量）
    const featuredMap = {};
    (db.notes || []).forEach(n => {
      if (n.featured && n.authorId) {
        featuredMap[n.authorId] = (featuredMap[n.authorId] || 0) + 1;
      }
    });
    const featuredRank = Object.entries(featuredMap)
      .map(([uid, count]) => ({ userId: uid, username: usernameMap[uid] || '未知用户', count }))
      .sort((a, b) => b.count - a.count);

    return { coinRank, timeRank, featuredRank };
  }
};

const SupabaseSync = {
  _client: null,
  _ready: false,
  _syncTimer: null,
  _lastPushedHash: '',    // 上次推送的完整状态哈希（避免重复推送）
  _lastPullTime: 0,       // 上次拉取时间戳（增量拉取）
  _pushing: false,        // 防止并发推送

  // 初始化 Supabase 客户端
  async init() {
    if (!SUPABASE_CONFIG.enabled) return;
    try {
      if (typeof supabase === 'undefined') {
        await new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
          script.onload = resolve;
          script.onerror = () => reject(new Error('Supabase SDK 加载失败'));
          document.head.appendChild(script);
        });
      }
      this._client = supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
      this._ready = true;
      console.log('Supabase 云同步已启用');
      await this.pullFromCloud();
      // 定期拉取（每 60 秒）
      this._syncTimer = setInterval(() => this.pullFromCloud(true), 60000);
      // 页面切换回来时立即拉取最新数据
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && this._ready) {
          this.pullFromCloud(true);
        }
      });
    } catch (e) {
      console.warn('Supabase 初始化失败，使用本地存储:', e.message);
      this._ready = false;
    }
  },

  // 计算数据哈希（简易但快速的哈希）
  _hash(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) { h = ((h << 5) - h + str.charCodeAt(i)) | 0; }
    return h.toString(36);
  },

  // 增量拉取：只拉取在 _lastPullTime 之后有变更的数据
  async pullFromCloud(incremental) {
    if (!this._ready) return;
    try {
      const db = JSON.parse(localStorage.getItem(DB._key)) || {};

      if (incremental && this._lastPullTime > 0) {
        // 增量模式：时间戳表增量拉取 + 小表全量拉取
        const since = this._lastPullTime - 60000; // 多拉1分钟防止遗漏
        const incTables = [
          { name: 'notes', timeCol: 'updated_at' },
          { name: 'messages', timeCol: 'created_at' },
          { name: 'links', timeCol: 'created_at' },
          { name: 'pets', timeCol: 'last_tick' }
        ];
        for (const { name, timeCol } of incTables) {
          const { data, error } = await this._client.from(name).select('*').gte(timeCol, since);
          if (error) { console.warn(`增量拉取 ${name} 失败:`, error.message); continue; }
          if (!data || data.length === 0) continue;
          this._mergeTable(db, name, data);
        }
        // 小表（无时间戳）每次全量拉取，保证跨设备同步
        const fullTables = ['coins', 'backpack_items', 'users', 'categories'];
        for (const table of fullTables) {
          const { data, error } = await this._client.from(table).select('*');
          if (error) { console.warn(`拉取 ${table} 失败:`, error.message); continue; }
          if (!data || data.length === 0) continue;
          this._mergeTable(db, table, data);
        }
      } else {
        // 全量拉取（首次加载）
        const tables = ['users', 'notes', 'links', 'messages', 'pets', 'coins', 'backpack_items', 'categories'];
        for (const table of tables) {
          const { data, error } = await this._client.from(table).select('*');
          if (error) { console.warn(`全量拉取 ${table} 失败:`, error.message); continue; }
          if (!data || data.length === 0) continue;
          this._mergeTable(db, table, data);
        }
      }

      this._lastPullTime = Date.now();
      localStorage.setItem(DB._key, JSON.stringify(db));
    } catch (e) {
      console.warn('云端数据拉取失败:', e.message);
    }
  },

  // 合并 Supabase 表数据到 localStorage
  _mergeTable(db, table, data) {
    switch (table) {
      case 'users':
        data.forEach(u => {
          if (!db.users) db.users = [];
          if (!db.users.find(lu => lu.id === u.id)) {
            db.users.push({ id: u.id, username: u.username, password: u.password, role: u.role, ip: u.ip || '', createdAt: u.created_at });
          }
        });
        break;
      case 'notes':
        // 按 ID 合并：保留本地不在云端的，覆盖云端已有的
        if (!db.notes) db.notes = [];
        const noteMap = new Map(db.notes.map(n => [n.id, n]));
        data.forEach(n => {
          noteMap.set(n.id, {
            id: n.id, title: n.title, content: n.content, visibility: n.visibility,
            category: n.category, featured: n.featured, featuredBy: n.featured_by,
            featuredAt: n.featured_at, authorId: n.author_id, authorName: n.author_name,
            status: n.status || 'approved',
            createdAt: n.created_at, updatedAt: n.updated_at
          });
        });
        db.notes = Array.from(noteMap.values());
        break;
      case 'links':
        if (!db.links) db.links = [];
        const linkMap = new Map(db.links.map(l => [l.id, l]));
        data.forEach(l => {
          linkMap.set(l.id, {
            id: l.id, name: l.name, url: l.url, desc: l.description, category: l.category,
            addedBy: l.added_by, createdAt: l.created_at
          });
        });
        db.links = Array.from(linkMap.values());
        break;
      case 'messages':
        if (!db.messages) db.messages = [];
        const msgMap = new Map(db.messages.map(m => [m.id, m]));
        data.forEach(m => {
          msgMap.set(m.id, {
            id: m.id, content: m.content, authorId: m.author_id, authorName: m.author_name, createdAt: m.created_at
          });
        });
        db.messages = Array.from(msgMap.values());
        break;
      case 'pets':
        if (!db.pets) db.pets = {};
        data.forEach(p => {
          db.pets[p.user_id] = {
            type: p.type, name: p.name, birthTime: p.birth_time,
            hunger: p.hunger, cleanliness: p.cleanliness, mood: p.mood,
            lastTick: p.last_tick, working: p.working, allZeroSince: p.all_zero_since, dead: p.dead
          };
        });
        break;
      case 'coins':
        if (!db.coins) db.coins = {};
        data.forEach(c => { db.coins[c.user_id] = c.amount; });
        break;
      case 'backpack_items':
        if (!db.backpacks) db.backpacks = {};
        data.forEach(bi => {
          if (!db.backpacks[bi.user_id]) db.backpacks[bi.user_id] = [];
          if (!db.backpacks[bi.user_id].find(i => i.bid === bi.bid)) {
            db.backpacks[bi.user_id].push({
              bid: bi.bid, type: bi.item_type, name: bi.item_name,
              hunger: bi.hunger, cleanliness: bi.cleanliness, mood: bi.mood, price: bi.price
            });
          }
        });
        break;
      case 'categories':
        if (!db.noteCategories) db.noteCategories = [];
        if (!db.linkCategories) db.linkCategories = [];
        data.forEach(c => {
          if (c.type === 'note' && !db.noteCategories.includes(c.name)) db.noteCategories.push(c.name);
          if (c.type === 'link' && !db.linkCategories.includes(c.name)) db.linkCategories.push(c.name);
        });
        break;
    }
  },

  // 智能推送：仅推送变更的数据（减少数据传输量）
  async pushFullSnapshot() {
    if (!this._ready || this._pushing) return;
    this._pushing = true;
    try {
      const db = JSON.parse(localStorage.getItem(DB._key));
      if (!db) { this._pushing = false; return; }

      // 计算当前状态哈希，与上次比较
      const currentHash = this._hash(JSON.stringify(db));
      if (currentHash === this._lastPushedHash) {
        this._pushing = false;
        return; // 无变更，跳过推送
      }
      this._lastPushedHash = currentHash;

      // 并行推送所有表（使用 Promise.all 减少等待时间）
      const tasks = [];

      if (db.users && db.users.length > 0) {
        tasks.push(
          this._client.from('users').upsert(
            db.users.map(u => ({ id: u.id, username: u.username, password: u.password, role: u.role, ip: u.ip || '', created_at: u.createdAt }))
          )
        );
      }
      if (db.notes && db.notes.length > 0) {
        tasks.push(
          this._client.from('notes').upsert(
            db.notes.map(n => ({
              id: n.id, title: n.title, content: n.content, visibility: n.visibility,
              category: n.category, featured: n.featured || false, featured_by: n.featuredBy,
              featured_at: n.featuredAt, author_id: n.authorId, author_name: n.authorName,
              status: n.status || 'approved',
              created_at: n.createdAt, updated_at: n.updatedAt
            }))
          )
        );
      }
      if (db.links && db.links.length > 0) {
        tasks.push(
          this._client.from('links').upsert(
            db.links.map(l => ({
              id: l.id, name: l.name, url: l.url, description: l.desc, category: l.category,
              added_by: l.addedBy, created_at: l.createdAt
            }))
          )
        );
      }
      if (db.messages && db.messages.length > 0) {
        tasks.push(
          this._client.from('messages').upsert(
            db.messages.map(m => ({
              id: m.id, content: m.content, author_id: m.authorId, author_name: m.authorName, created_at: m.createdAt
            }))
          )
        );
      }
      if (db.pets && Object.keys(db.pets).length > 0) {
        const petRows = Object.entries(db.pets).map(([uid, p]) => ({
          user_id: uid, type: p.type, name: p.name, birth_time: p.birthTime,
          hunger: p.hunger, cleanliness: p.cleanliness, mood: p.mood,
          last_tick: p.lastTick, working: p.working, all_zero_since: p.allZeroSince, dead: p.dead || false
        }));
        tasks.push(this._client.from('pets').upsert(petRows));
      }
      if (db.coins && Object.keys(db.coins).length > 0) {
        const coinRows = Object.entries(db.coins).map(([uid, amt]) => ({ user_id: uid, amount: amt }));
        tasks.push(this._client.from('coins').upsert(coinRows));
      }
      if (db.backpacks && Object.keys(db.backpacks).length > 0) {
        const bpRows = [];
        Object.entries(db.backpacks).forEach(([uid, items]) => {
          if (!items || items.length === 0) return;
          items.forEach(i => bpRows.push({
            bid: i.bid, user_id: uid, item_type: i.type, item_name: i.name,
            hunger: i.hunger, cleanliness: i.cleanliness, mood: i.mood, price: i.price
          }));
        });
        if (bpRows.length > 0) tasks.push(this._client.from('backpack_items').upsert(bpRows));
      }
      if (db.noteCategories || db.linkCategories) {
        const catRows = [];
        (db.noteCategories || []).forEach(c => catRows.push({ id: 'nc_' + c, type: 'note', name: c }));
        (db.linkCategories || []).forEach(c => catRows.push({ id: 'lc_' + c, type: 'link', name: c }));
        if (catRows.length > 0) tasks.push(this._client.from('categories').upsert(catRows));
      }

      const results = await Promise.allSettled(tasks);
      const failed = results.filter(r => r.status === 'rejected').length;
      if (failed > 0) console.warn(`Supabase 同步: ${results.length - failed}/${results.length} 表成功`);
    } catch (e) {
      console.warn('Supabase 推送失败:', e.message);
    }
    this._pushing = false;
  },

  destroy() {
    if (this._syncTimer) { clearInterval(this._syncTimer); this._syncTimer = null; }
  }
};

// 获取客户端公网 IP
async function getClientIp() {
  const services = [
    'https://api.ipify.org?format=json',
    'https://api.ip.sb/ip',
    'https://httpbin.org/ip'
  ];
  for (const url of services) {
    try {
      const resp = await fetch(url, { signal: AbortSignal.timeout(3000) });
      const text = await resp.text();
      // 尝试解析 JSON 格式
      try {
        const json = JSON.parse(text);
        return json.ip || '';
      } catch { return text.trim(); }
    } catch { continue; }
  }
  return 'unknown';
}

// 检查 IP 注册数量限制（需 Supabase 启用）
async function checkIpLimit(ip) {
  if (!ip || ip === 'unknown') return { ok: true }; // 获取不到 IP 时放行
  if (!SupabaseSync._ready) return { ok: true };    // 未启用 Supabase 时放行
  try {
    const { data, error } = await SupabaseSync._client
      .from('users')
      .select('id')
      .eq('ip', ip);
    if (error) return { ok: true }; // 查询失败时放行
    if (data && data.length >= 2) {
      return { ok: false, msg: '该 IP 地址注册账号已达上限（2个），如有疑问请联系管理员' };
    }
    return { ok: true };
  } catch { return { ok: true }; }
}

function formatAge(ms) {
  const totalH = Math.floor(ms / (1000 * 60 * 60));
  const m = Math.floor((ms % (1000 * 60 * 60)) / (1000 * 60));
  if (totalH > 0) return `${totalH} 小时 ${m} 分钟`;
  return `${m} 分钟`;
}

// ===================== 细雨 Canvas =====================
function initRain() {
  const canvas = document.getElementById('rain-canvas');
  const ctx = canvas.getContext('2d');
  let w, h, drops = [];

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const dropCount = Math.floor(w * h / 5000);
  for (let i = 0; i < dropCount; i++) {
    drops.push({
      x: Math.random() * w,
      y: Math.random() * h,
      len: Math.random() * 14 + 8,
      speed: Math.random() * 3 + 2.5,
      opacity: Math.random() * 0.28 + 0.08
    });
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);
    ctx.lineWidth = 0.5;
    for (let i = 0; i < drops.length; i++) {
      const d = drops[i];
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x - 0.6, d.y + d.len);
      ctx.strokeStyle = `rgba(180,200,220,${d.opacity})`;
      ctx.stroke();
      d.y += d.speed;
      if (d.y > h + 20) { d.y = -20; d.x = Math.random() * w; }
    }
    requestAnimationFrame(draw);
  }
  draw();
}

// ===================== 窸窣细雨声 (Web Audio API) =====================
const RainSound = {
  ctx: null,
  playing: false,
  masterGain: null,
  noiseNodes: [],

  async start() {
    if (this.playing) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) { return; }

    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = 0;
    this.masterGain.connect(this.ctx.destination);

    // 仅保留低频柔和的沙沙声，模拟静谧细雨窸窣
    // 底层：极低频柔和噪音（微风般的底噪）
    this._createGentleLayer(1, 0.03, 150, 400, 0.4);
    // 中层：柔和的中低频沙沙声（雨丝擦过树叶）
    this._createGentleLayer(2, 0.04, 400, 1500, 0.7);
    // 高层：极轻的高频气息（远处细密雨雾）
    this._createGentleLayer(1, 0.02, 1200, 3500, 0.5);

    // 非常缓慢的淡入（3 秒）
    this.masterGain.gain.linearRampToValueAtTime(0.10, this.ctx.currentTime + 3.0);
    this.playing = true;
  },

  _createGentleLayer(count, volBase, lowFreq, highFreq, q) {
    for (let i = 0; i < count; i++) {
      const bufferSize = this.ctx.sampleRate * 3;
      const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
      const data = buffer.getChannelData(0);
      // 使用更平滑的噪声
      let last = 0;
      for (let j = 0; j < bufferSize; j++) {
        last = last * 0.85 + (Math.random() * 2 - 1) * 0.15;
        data[j] = last;
      }
      const source = this.ctx.createBufferSource();
      source.buffer = buffer;
      source.loop = true;

      const bandpass = this.ctx.createBiquadFilter();
      bandpass.type = 'bandpass';
      bandpass.frequency.value = lowFreq + Math.random() * (highFreq - lowFreq);
      bandpass.Q.value = q;

      const gain = this.ctx.createGain();
      gain.gain.value = volBase + Math.random() * 0.02;

      // 极缓慢的微风式音量波动
      const lfo = this.ctx.createOscillator();
      const lfoGain = this.ctx.createGain();
      lfo.frequency.value = 0.03 + Math.random() * 0.08;
      lfoGain.gain.value = 0.008;
      lfo.connect(lfoGain);
      lfoGain.connect(gain.gain);
      lfo.start();

      source.connect(bandpass);
      bandpass.connect(gain);
      gain.connect(this.masterGain);
      source.start();

      this.noiseNodes.push(source, bandpass, gain, lfo, lfoGain);
    }
  },

  stop() {
    this.playing = false;
    try {
      this.noiseNodes.forEach(n => { try { n.stop(); } catch(e) {} });
    } catch(e) {}
    this.noiseNodes = [];
    if (this.ctx) {
      this.ctx.close();
      this.ctx = null;
    }
  },

  toggle() {
    if (this.playing) {
      this.stop();
      return false;
    } else {
      this.start();
      return true;
    }
  }
};

// ===================== 北京时间 Clock =====================
function startClock() {
  function update() {
    const el = document.getElementById('live-clock');
    if (!el) return;
    const now = new Date();
    const bj = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Shanghai' }));
    const y = bj.getFullYear();
    const mo = String(bj.getMonth() + 1).padStart(2, '0');
    const d = String(bj.getDate()).padStart(2, '0');
    const h = String(bj.getHours()).padStart(2, '0');
    const mi = String(bj.getMinutes()).padStart(2, '0');
    const s = String(bj.getSeconds()).padStart(2, '0');
    el.innerHTML = `${y}-${mo}-${d} <span class="clock-time">${h}:${mi}:${s}</span>`;
  }
  update();
  setInterval(update, 1000);
}

function bindAuthEvents() {
  window._authMode = window._authMode || 'login';

  document.querySelectorAll('[data-auth-mode]').forEach(el => {
    el.addEventListener('click', () => {
      window._authMode = el.dataset.authMode;
      render();
    });
  });

  const form = document.getElementById('auth-form');
  if (!form) return;
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('auth-username').value.trim();
    const password = document.getElementById('auth-password').value;

    if (window._authMode === 'register') {
      const p2 = document.getElementById('auth-password2').value;
      if (!username || !password) return showToast('请填写所有字段', 'error');
      if (password !== p2) return showToast('两次密码不一致', 'error');
      if (password.length < 3) return showToast('密码至少3位', 'error');

      // IP 限制检查
      const btn = form.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = '检查中...';
      const ip = await getClientIp();
      const ipCheck = await checkIpLimit(ip);
      if (!ipCheck.ok) {
        showToast(ipCheck.msg, 'error');
        btn.disabled = false;
        btn.textContent = '注 册';
        return;
      }

      const result = DB.register(username, password, ip);
      btn.disabled = false;
      btn.textContent = '注 册';
      if (result.ok) {
        DB.login(username, password);
        showToast('注册成功，欢迎加入 XY空间', 'success');
        render();
      } else {
        showToast(result.msg, 'error');
      }
    } else {
      if (!username || !password) return showToast('请输入用户名和密码', 'error');
      const result = DB.login(username, password);
      if (result.ok) {
        showToast('欢迎回来，' + result.user.username, 'success');
        render();
      } else {
        showToast(result.msg, 'error');
      }
    }
  });
}

        if (!confirm('确认审核通过这条笔记？通过后将对所有人可见。')) return;
        DB.approveNote(noteId);
        showToast('✅ 笔记已审核通过', 'success');
        overlay.remove();
        refreshTabContent();
      });
    }

    // 驳回删除按钮
    const btnReject = overlay.querySelector('#detail-reject');
    if (btnReject) {
      btnReject.addEventListener('click', () => {
        if (!confirm('确认驳回并删除这条笔记？此操作不可恢复。')) return;
        DB.rejectNote(noteId);
        showToast('❌ 笔记已驳回并删除', 'success');
        overlay.remove();
        refreshTabContent();
      });
    }
  }
}

// ---------- 精灵宠物 Tab ----------
function renderPetTab(user) {
  // 先检查打工是否完成
  const workResult = DB.checkWork(user.id);
  if (workResult) showToast(`🎉 打工完成！获得 ${workResult.coins} XY币`, 'success');
  if (workResult) updateHeaderCoins();

  const livePet = DB.getPetLiveState(user.id);

  // 精灵已死亡
  if (livePet && livePet.dead) return renderPetDeath(user, livePet);
  if (!livePet && DB.isPetDead(user.id)) {
    const deadPet = DB.getPet(user.id);
    return renderPetDeath(user, deadPet);
  }
  if (!livePet) return renderPetSelection();

  const rawPet = DB.getPet(user.id);
  const coins = DB.getCoins(user.id);
  const typeInfo = PET_TYPES.find(t => t.id === livePet.type) || PET_TYPES[0];
  const statClass = (v) => v > 60 ? 'stat-good' : v > 25 ? 'stat-warn' : 'stat-bad';
  const moodEmoji = livePet.mood > 70 ? '😊' : livePet.mood > 30 ? '😐' : '😢';

  // 打工状态
  let workStatus = '';
  if (rawPet && rawPet.working) {
    const elapsed = (Date.now() - rawPet.working.startTime) / (1000 * 60 * 60);
    const remaining = Math.max(0, rawPet.working.hours - elapsed);
    const remainingH = Math.floor(remaining);
    const remainingM = Math.ceil((remaining - remainingH) * 60);
    let remainingStr = remainingH > 0 ? `${remainingH} 小时` : '';
    if (remainingM > 0) remainingStr += (remainingStr ? ' ' : '') + `${remainingM} 分钟`;
    if (!remainingStr) remainingStr = '不到 1 分钟';
    if (remaining <= 0) {
      workStatus = '<div style="margin-top:12px;color:#6bc08a;font-size:13px;">✅ 打工已完成，重新进入页面即可领取！</div>';
    } else {
      workStatus = `<div style="margin-top:12px;color:#e0b44a;font-size:13px;">⏳ 打工中... 剩余约 ${remainingStr}</div>`;
    }
  }

  return `
    <div class="pet-container">
      <!-- 金币展示 -->
      <div style="display:flex;justify-content:center;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap;">
        <div style="padding:8px 20px;background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,0.2);border-radius:20px;font-size:14px;">
          💰 <span style="color:#ffd700;font-weight:600;">${coins} XY币</span>
        </div>
        <div style="padding:8px 16px;background:rgba(255,255,255,0.04);border:1px solid var(--glass-border);border-radius:20px;font-size:13px;color:var(--text-secondary);">
          🎒 背包 ${DB.getBackpack(user.id).length} 件
        </div>
        ${!rawPet || !rawPet.working ? `<button class="btn btn-primary btn-sm" id="btn-start-work">💼 去打工</button>` : ''}
      </div>

      <div class="pet-display">
        <div class="pet-sprite" id="pet-sprite-click">${typeInfo.sprite}</div>
        <div class="pet-name">${escapeHtml(livePet.name)} <span style="font-size:18px;">${moodEmoji}</span></div>
        <div class="pet-age">🕐 已陪伴 ${formatAge(livePet.ageMs)}</div>
      </div>

      <div class="pet-stats">
        <div class="stat-row">
          <span class="stat-label">🍞 饱食度</span>
          <div class="stat-bar-wrap"><div class="stat-bar-fill ${statClass(livePet.hunger)}" style="width:${livePet.hunger}%"></div></div>
          <span class="stat-val">${livePet.hunger}</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">🛁 清洁值</span>
          <div class="stat-bar-wrap"><div class="stat-bar-fill ${statClass(livePet.cleanliness)}" style="width:${livePet.cleanliness}%"></div></div>
          <span class="stat-val">${livePet.cleanliness}</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">💖 心情值</span>
          <div class="stat-bar-wrap"><div class="stat-bar-fill ${statClass(livePet.mood)}" style="width:${livePet.mood}%"></div></div>
          <span class="stat-val">${livePet.mood}</span>
        </div>
      </div>

      <div class="pet-actions">
        <button class="pet-action-btn" id="btn-open-backpack"><span class="action-icon">🎒</span>背包</button>
        <button class="pet-action-btn" id="btn-open-shop2"><span class="action-icon">🛒</span>商店</button>
        ${rawPet && rawPet.working ? `<button class="pet-action-btn" id="btn-cancel-work"><span class="action-icon">🚫</span>取消打工</button>` : ''}
      </div>

      ${workStatus}

      <div style="margin-top:16px;padding:10px 14px;background:rgba(229,115,115,0.08);border:1px solid rgba(229,115,115,0.15);border-radius:10px;font-size:12px;color:var(--text-secondary);text-align:center;line-height:1.6;">
        💡 小提示：请定期照顾你的精灵哦～饱食、清洁、心情任意一项数值归零后超过 <b style="color:var(--danger);">48 小时</b>，精灵就会永远离开你了 😢
      </div>

      <div class="pet-release">
        <button class="btn btn-ghost btn-sm" id="btn-release-pet">🕊 放生精灵 · 重新选择</button>
      </div>
    </div>`;
}

// ===================== 事件绑定 =====================
function bindDashboardEvents() {
  // Sound toggle
  const soundBtn = document.getElementById('sound-toggle');
  if (soundBtn) {
    soundBtn.addEventListener('click', () => {
      const on = RainSound.toggle();
      soundBtn.classList.toggle('on', on);
      soundBtn.innerHTML = on ? '🔊' : '🔇';
      soundBtn.title = on ? '关闭雨声' : '开启雨声';
    });
  }

  // Tab 切换
  document.querySelectorAll('.dash-tab[data-tab]').forEach(el => {
    el.addEventListener('click', () => {
      currentTab = el.dataset.tab;
      noteFilter = 'public';
      noteCategory = 'all';
      linkCategory = 'all';
      if (currentTab !== 'pet') stopWorkPolling();
      render();
      // 切换到精灵/排行榜时立即拉取最新数据（打工状态、金币、物品等）
      if ((currentTab === 'pet' || currentTab === 'leaderboard') && SupabaseSync._ready) {
        SupabaseSync.pullFromCloud(true);
      }
    });
  });

  // 退出
  const btnLogout = document.getElementById('btn-logout');
  if (btnLogout) {
    btnLogout.addEventListener('click', () => {
      DB.logout();
      stopWorkPolling();
      showToast('已退出登录');
      if (RainSound.playing) RainSound.stop();
      render();
    });
  }

  // 笔记筛选 sub-tabs
  document.querySelectorAll('[data-note-filter]').forEach(el => {
    el.addEventListener('click', () => {
      noteFilter = el.dataset.noteFilter;
      noteCategory = 'all';
      refreshTabContent();
    });
  });
  // 笔记分类筛选
  document.querySelectorAll('[data-note-cat]').forEach(el => {
    el.addEventListener('click', () => {
      noteCategory = el.dataset.noteCat;
      refreshTabContent();
    });
  });

  // 笔记分类管理
  const btnManageNoteCats = document.getElementById('btn-manage-note-cats');
  if (btnManageNoteCats) btnManageNoteCats.addEventListener('click', () => openNoteCategoryModal());

  // 新增笔记
  const btnAddNote = document.getElementById('btn-add-note');
  if (btnAddNote) btnAddNote.addEventListener('click', () => openNoteModal());

  // 查看笔记详情
  document.querySelectorAll('[data-view-note]').forEach(el => {
    el.addEventListener('click', (e) => {
      // 防止点击到删除/编辑按钮时触发
      if (e.target.closest('[data-edit-note]') || e.target.closest('[data-del-note]')) return;
      openNoteDetail(el.dataset.viewNote);
    });
  });

  // 链接分类筛选
  document.querySelectorAll('.cat-chip[data-cat]').forEach(el => {
    el.addEventListener('click', () => {
      linkCategory = el.dataset.cat;
      refreshTabContent();
    });
  });

  // 新增链接
  const btnAddLink = document.getElementById('btn-add-link');
  if (btnAddLink) btnAddLink.addEventListener('click', () => openLinkModal());

  // 管理分类
  const btnManageCats = document.getElementById('btn-manage-cats');
  if (btnManageCats) btnManageCats.addEventListener('click', () => openCategoryModal());

  // 删除链接
  document.querySelectorAll('[data-del-link]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault(); e.stopPropagation();
      if (confirm('确认删除此导航链接？')) {
        DB.deleteLink(btn.dataset.delLink);
        showToast('链接已删除');
        refreshTabContent();
      }
    });
  });

  // 删除留言
  document.querySelectorAll('[data-del-msg]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (confirm('确认删除此留言？')) {
        DB.deleteMessage(btn.dataset.delMsg);
        showToast('留言已删除');
        refreshTabContent();
      }
    });
  });

  // 删除用户（管理员）
  document.querySelectorAll('[data-del-user]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const username = btn.closest('div').querySelector('span').textContent;
      if (confirm(`⚠️ 确认删除用户「${username}」及其所有数据？\n\n此操作不可恢复，将删除：\n- 该用户的所有笔记、链接、留言\n- 该用户的精灵、XY币、背包物品\n\n确定删除吗？`)) {
        btn.disabled = true;
        btn.textContent = '删除中...';
        const ok = await DB.deleteUser(btn.dataset.delUser);
        if (ok) {
          showToast(`用户「${username}」及其数据已删除`, 'success');
        } else {
          showToast('删除失败', 'error');
          btn.disabled = false;
          btn.textContent = '🗑 删除账户及所有数据';
        }
        refreshTabContent();
      }
    });
  });

  // 发送留言
  const msgForm = document.getElementById('leave-msg-form');
  if (msgForm) {
    msgForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const content = document.getElementById('msg-content').value.trim();
      if (!content) return showToast('请输入留言内容', 'error');
      DB.addMessage(content);
      document.getElementById('msg-content').value = '';
      showToast('留言已发送，感谢你的反馈！', 'success');
    });
  }

  // 精灵：选择
  document.querySelectorAll('[data-select-pet]').forEach(el => {
    el.addEventListener('click', () => {
      const typeId = el.dataset.selectPet;
      const typeInfo = PET_TYPES.find(t => t.id === typeId);
      const defaultName = typeInfo ? typeInfo.name : '小精灵';
      const name = prompt(`给你的${defaultName}起个名字吧：`, defaultName);
      if (!name || !name.trim()) return;
      const user = DB.getCurrentUser();
      DB.createPet(user.id, typeId, name.trim());
      showToast(`${name.trim()} 成为了你的学习伙伴！🎉`);
      refreshTabContent();
    });
  });

  // 精灵：点击精灵动画反馈（0.1% 概率触发心情提升）
  const petSprite = document.getElementById('pet-sprite-click');
  if (petSprite) {
    petSprite.addEventListener('click', () => {
      const user = DB.getCurrentUser();
      const pet = DB.getPetLiveState(user.id);
      if (pet && Math.random() < 0.001) {
        const newMood = Math.min(100, pet.mood + 5);
        DB.updatePet(user.id, {
          hunger: pet.hunger,
          cleanliness: pet.cleanliness,
          mood: newMood,
          lastTick: Date.now()
        });
        refreshTabContent();
        showToast('💕 精灵罕见地对你笑了！心情 +5');
      }
    });
  }

  // 精灵：放生
  const btnRelease = document.getElementById('btn-release-pet');
  if (btnRelease) {
    btnRelease.addEventListener('click', () => {
      const user = DB.getCurrentUser();
      const pet = DB.getPet(user.id);
      if (!pet) return;
      if (!confirm(`确定要放生「${pet.name}」吗？陪伴数据将清零，你可以重新选择精灵。`)) return;
      DB.deletePet(user.id);
      showToast('🕊 精灵已放生，感谢陪伴。');
      refreshTabContent();
    });
  }

  // 精灵：重新选择（死亡后）
  const btnReborn = document.getElementById('btn-reborn-pet');
  if (btnReborn) {
    btnReborn.addEventListener('click', () => {
      const user = DB.getCurrentUser();
      DB.deletePet(user.id);
      showToast('请选择一只新的精灵吧 💫');
      refreshTabContent();
    });
  }

  // 精灵：打开商店（顶部按钮和底部按钮）
  const btnShop = document.getElementById('btn-open-shop');
  const btnShop2 = document.getElementById('btn-open-shop2');
  if (btnShop) btnShop.addEventListener('click', () => openShopModal());
  if (btnShop2) btnShop2.addEventListener('click', () => openShopModal());

  // 精灵：打开背包
  const btnBackpack = document.getElementById('btn-open-backpack');
  if (btnBackpack) btnBackpack.addEventListener('click', () => openBackpackModal());

  // 精灵：去打工
  const btnWork = document.getElementById('btn-start-work');
  if (btnWork) btnWork.addEventListener('click', () => openWorkModal());

  // 精灵：取消打工
  const btnCancelWork = document.getElementById('btn-cancel-work');
  if (btnCancelWork) {
    btnCancelWork.addEventListener('click', () => {
      const user = DB.getCurrentUser();
      if (!confirm('确定取消打工吗？不会获得任何收益。')) return;
      DB.cancelWork(user.id);
      stopWorkPolling();
      showToast('打工已取消');
      refreshTabContent();
    });
  }

  // 打工轮询：如果当前在精灵标签且精灵正在打工，启动轮询
  if (currentTab === 'pet') {
    const user = DB.getCurrentUser();
    if (user) {
      const pet = DB.getPet(user.id);
      if (pet && pet.working) startWorkPolling();
    }
  }
}

function refreshTabContent() {
  const user = DB.getCurrentUser();
  const isAdmin = DB.isAdmin();
  document.getElementById('tab-content').innerHTML = renderTabContent(user, isAdmin);
  bindDashboardEvents();
}

// ---------- 打工轮询 ----------
function startWorkPolling() {
  stopWorkPolling();
  workPollInterval = setInterval(() => {
    const user = DB.getCurrentUser();
    if (!user || currentTab !== 'pet') {
      stopWorkPolling();
      return;
    }
    const result = DB.checkWork(user.id);
    if (result) {
      stopWorkPolling();
      showToast(`🎉 打工完成！获得 ${result.coins} XY币`, 'success');
      updateHeaderCoins();
      refreshTabContent();
    }
  }, 30000);
}

function stopWorkPolling() {
  if (workPollInterval) {
    clearInterval(workPollInterval);
    workPollInterval = null;
  }
}

// ---------- 笔记编辑弹窗 ----------
function openNoteModal(noteId) {
  const db = DB._read();
  const note = noteId ? db.notes.find(n => n.id === noteId) : null;
  const isEdit = !!note;
  const noteCats = DB.getNoteCategories();
  // 汇总实际使用的分类
  const usedCats = new Set(db.notes.map(n => n.category).filter(Boolean));
  const allCats = [...new Set([...noteCats, ...usedCats])];

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal glass-card">
      <h3>${isEdit ? '编辑分享' : '写分享'}</h3>
      <div class="form-group">
        <label class="form-label">标题</label>
        <input class="form-input" id="modal-note-title" value="${isEdit ? escapeHtml(note.title) : ''}" placeholder="输入分享标题">
      </div>
      <div class="form-group">
        <label class="form-label">内容</label>
        <textarea class="form-textarea" id="modal-note-content" placeholder="记录你的学习心得...">${isEdit ? escapeHtml(note.content) : ''}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">分类</label>
        <div style="display:flex;gap:8px;align-items:center;">
          <select class="form-select" id="modal-note-cat" style="flex:1;">
            ${allCats.map(c => `<option value="${escapeHtml(c)}" ${(note && note.category === c) ? 'selected' : ''}>${escapeHtml(c)}</option>`).join('')}
          </select>
          <button class="btn btn-ghost btn-sm" id="btn-new-note-cat" type="button" style="flex-shrink:0;">+ 新分类</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">可见范围</label>
        <div class="vis-toggle" id="modal-vis-toggle">
          <button class="vis-option ${(!note || note.visibility==='public')?'active':''}" data-vis="public">🌍 公开</button>
          <button class="vis-option ${(note && note.visibility==='private')?'active':''}" data-vis="private">🔒 私有</button>
        </div>
      </div>
      ${!isEdit && !DB.isAdmin() ? `<div style="margin-top:-8px;margin-bottom:8px;padding:8px 12px;background:rgba(255,200,50,0.08);border:1px solid rgba(255,200,50,0.15);border-radius:8px;font-size:12px;color:#e0b44a;text-align:center;">⏳ 公开分享需经管理员审核通过后才会对他人可见</div>` : ''}
      ${isEdit && !DB.isAdmin() && note && note.visibility === 'public' ? `<div style="margin-top:-8px;margin-bottom:8px;padding:8px 12px;background:rgba(255,200,50,0.08);border:1px solid rgba(255,200,50,0.15);border-radius:8px;font-size:12px;color:#e0b44a;text-align:center;">⏳ 编辑后需重新经管理员审核</div>` : ''}
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modal-cancel">取消</button>
        <button class="btn btn-primary" id="modal-save">${isEdit ? '保存修改' : '发布分享'}</button>
      </div>
    </div>`;

  document.body.appendChild(overlay);

  let visibility = (note && note.visibility) || 'public';
  overlay.querySelectorAll('.vis-option').forEach(btn => {
    btn.addEventListener('click', () => {
      overlay.querySelectorAll('.vis-option').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      visibility = btn.dataset.vis;
    });
  });

  // 新分类
  overlay.querySelector('#btn-new-note-cat').addEventListener('click', () => {
    const name = prompt('输入新分类名称：');
    if (name && name.trim()) {
      DB.addNoteCategory(name.trim());
      const sel = overlay.querySelector('#modal-note-cat');
      const opt = document.createElement('option');
      opt.value = name.trim(); opt.textContent = name.trim(); opt.selected = true;
      sel.appendChild(opt);
    }
  });

  overlay.querySelector('#modal-cancel').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

  overlay.querySelector('#modal-save').addEventListener('click', () => {
    const title = overlay.querySelector('#modal-note-title').value.trim();
    const content = overlay.querySelector('#modal-note-content').value.trim();
    const category = overlay.querySelector('#modal-note-cat').value;
    if (!title) return showToast('请输入标题', 'error');
    if (!content) return showToast('请输入内容', 'error');

    if (isEdit) {
      DB.updateNote(noteId, title, content, visibility, category);
      showToast(visibility === 'public' && !DB.isAdmin() ? '已更新，重新进入审核队列' : '分享已更新');
    } else {
      DB.addNote(title, content, visibility, category);
      showToast(visibility === 'public' && !DB.isAdmin() ? '已提交审核，通过后将公开显示' : '分享发布成功');
    }
    overlay.remove();
    refreshTabContent();
  });
}

      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">

      </div>

      <h4 style="font-size:14px;margin-bottom:10px;color:var(--accent);">🎾 玩具</h4>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">

  overlay.querySelectorAll('.shop-buy-btn').forEach(btn => {

      for (const cat of ['food', 'clean', 'toy']) {

      updateHeaderCoins();
      overlay.remove();
      refreshTabContent();
    });
  });
}

    btn.addEventListener('click', () => {
      const bid = btn.dataset.bid;
      const item = items.find(i => i.bid === bid);
      if (!item) return;

      const pet = DB.getPet(user.id);
      if (!pet) return;
      const now = Date.now();
      let { hunger, cleanliness, mood } = DB.getPetLiveState(user.id);
      DB.updatePet(user.id, {
        lastTick: now,
        hunger: Math.min(100, hunger + (item.hunger || 0)),
        cleanliness: Math.min(100, cleanliness + (item.cleanliness || 0)),
        mood: Math.min(100, mood + (item.mood || 0))
      });
      DB.removeFromBackpack(user.id, bid);

      showToast(`✅ 使用了「${item.name}」！`, 'success');
      overlay.remove();
      refreshTabContent();
    });
  });
}

// ---------- 笔记分类管理弹窗 ----------
function openNoteCategoryModal() {
  const categories = DB.getNoteCategories();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal glass-card">
      <h3>管理笔记分类</h3>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">
        ${categories.length === 0 ? '<p style="color:var(--text-secondary);font-size:13px;">暂无分类</p>' : ''}
        ${categories.map(c => `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(255,255,255,0.04);border-radius:8px;border:1px solid var(--glass-border);">
            <span style="font-size:14px;">${escapeHtml(c)}</span>
            <button class="btn btn-ghost btn-sm" data-del-note-cat="${escapeHtml(c)}">删除</button>
          </div>
        `).join('')}
      </div>
      <div class="form-group" style="display:flex;gap:8px;">
        <input class="form-input" id="modal-new-note-cat" placeholder="输入新分类名称" style="flex:1;">
        <button class="btn btn-primary btn-sm" id="modal-add-note-cat" style="flex-shrink:0;">添加</button>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modal-note-cat-close">关闭</button>
      </div>
    </div>`;

  document.body.appendChild(overlay);
  const close = () => { overlay.remove(); refreshTabContent(); };
  overlay.querySelector('#modal-note-cat-close').addEventListener('click', close);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });

  overlay.querySelector('#modal-add-note-cat').addEventListener('click', () => {
    const input = overlay.querySelector('#modal-new-note-cat');
    const name = input.value.trim();
    if (!name) return showToast('请输入分类名称', 'error');
    DB.addNoteCategory(name);
    showToast('分类已添加');
    overlay.remove();
    openNoteCategoryModal();
  });

  overlay.querySelectorAll('[data-del-note-cat]').forEach(btn => {
    btn.addEventListener('click', () => {
      const name = btn.dataset.delNoteCat;
      if (!confirm(`确认删除分类「${name}」？该分类下的笔记将移入「未分类」。`)) return;
      DB.deleteNoteCategory(name);
      showToast(`分类「${name}」已删除`);
      overlay.remove();
      openNoteCategoryModal();
    });
  });
}

// ===================== 启动 =====================
window.addEventListener('DOMContentLoaded', () => {
  try {
    initRain();
    render();
  } catch(e) {
    console.error('Startup error:', e);
    document.getElementById('app').innerHTML = '<div style="color:red;padding:40px;text-align:center;"><h2>启动失败</h2><p>' + e.message + '</p></div>';
  }
});
</script>
